<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>P0b Orphan Scene</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #050608;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .p0b-orphan-bg {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: #5a1d1d;
      }

      #p0b-orphan-title {
        margin: 0;
        font-size: 96px;
        font-weight: 820;
        line-height: 1.1;
        letter-spacing: 0;
        color: #fff7f7;
      }
    </style>
  </head>
  <body>
    <div
      id="p0b-orphan-root"
      data-composition-id="p0b-orphan"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="5"
      style="position: absolute; inset: 0; width: 1920px; height: 1080px; overflow: hidden;"
    >
      <div id="p0b-orphan-bg" class="p0b-orphan-bg">
        <h1 id="p0b-orphan-title">고아 장면</h1>
      </div>
    </div>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        tl.fromTo(
          "#p0b-orphan-title",
          { opacity: 0, y: 50 },
          { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" },
          0.25,
        );
        window.__timelines = window.__timelines || {};
        window.__timelines["p0b-orphan"] = tl;
      })();
    </script>
    <template id="p0b-orphan-template">
      <style>
        .p0b-orphan-bg {
          position: absolute;
          inset: 0;
          display: grid;
          place-items: center;
          background: #5a1d1d;
        }
        #p0b-orphan-title {
          margin: 0;
          font-size: 96px;
          font-weight: 820;
          line-height: 1.1;
          letter-spacing: 0;
          color: #fff7f7;
        }
      </style>
      <div
        id="p0b-orphan-root"
        data-composition-id="p0b-orphan"
        data-width="1920"
        data-height="1080"
        data-start="0"
        data-duration="5"
        style="position: absolute; inset: 0; width: 1920px; height: 1080px; overflow: hidden;"
      >
        <div id="p0b-orphan-bg" class="p0b-orphan-bg">
          <h1 id="p0b-orphan-title">고아 장면</h1>
        </div>
      </div>
      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        (function () {
          const tl = gsap.timeline({ paused: true });
          tl.fromTo(
            "#p0b-orphan-title",
            { opacity: 0, y: 50 },
            { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" },
            0.25,
          );
          window.__timelines = window.__timelines || {};
          window.__timelines["p0b-orphan"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
