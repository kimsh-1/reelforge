<!doctype html>
<html
  lang="ko"
  data-composition-variables='[
    {"id":"title","type":"string","label":"Title","default":"비교"},
    {"id":"items","type":"json","label":"Items","default":[]},
    {"id":"values","type":"json","label":"Values","default":[]},
    {"id":"unit","type":"string","label":"Unit","default":""},
    {"id":"accent","type":"color","label":"Accent","default":"Highlight"},
    {"id":"mood","type":"string","label":"Mood","default":"informative"},
    {"id":"emphasis","type":"string","label":"Emphasis","default":"contrast"},
    {"id":"reveal","type":"string","label":"Reveal","default":"split_reveal"},
    {"id":"visualKind","type":"string","label":"Visual kind","default":"chart"},
    {"id":"source","type":"string","label":"Source","default":""},
    {"id":"leftLabel","type":"string","label":"Left label","default":""},
    {"id":"rightLabel","type":"string","label":"Right label","default":""},
    {"id":"repeatIndex","type":"number","label":"Repeat index","default":0}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>ReelForge compare block</title>
  </head>
  <body>
    <template>
      <div
        id="compare-root"
        data-composition-id="compare"
        data-width="1920"
        data-height="1080"
        data-duration="5"
        role="img"
        aria-label=""
      >
        <style>
          #compare-root {
            position: absolute;
            inset: 0;
            width: 1920px;
            height: 1080px;
            box-sizing: border-box;
            overflow: hidden;
            color: var(--compare-ink);
            font-family: "Pretendard", "Pretendard Variable", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --compare-ink: var(--rf-text, currentColor);
            --compare-muted: var(--rf-ink-subtle, var(--rf-muted-text, var(--rf-text, currentColor)));
            --compare-tertiary: var(--rf-ink-tertiary, var(--rf-ink-subtle, var(--rf-text, currentColor)));
            --compare-accent: var(--rf-accent, var(--rf-text, currentColor));
            --compare-accent-alt: var(--rf-accent-alt, var(--rf-accent, var(--rf-text, currentColor)));
            --compare-success: var(--rf-success, var(--rf-accent-alt, var(--rf-accent, var(--rf-text, currentColor))));
            --compare-surface: var(--rf-surface-2, color-mix(in srgb, var(--rf-text, currentColor) 7%, transparent));
            --compare-hairline: var(--rf-hairline, color-mix(in srgb, var(--rf-text, currentColor) 18%, transparent));
            --compare-hairline-strong: var(--rf-hairline-strong, var(--rf-hairline, color-mix(in srgb, var(--rf-text, currentColor) 34%, transparent)));
            --compare-type-small: 1.45rem;
            --compare-type-title: 4.5rem;
            --compare-type-display: 11.5rem;
          }

          .compare-stage {
            position: absolute;
            inset: 7.2% 6.25%;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            gap: 2.5rem;
            min-width: 0;
            min-height: 0;
            box-sizing: border-box;
          }

          .compare-ghost {
            position: absolute;
            top: 10%;
            right: 3%;
            z-index: 0;
            margin: 0;
            color: var(--compare-ink);
            font-family: ui-monospace, "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
            font-size: var(--compare-type-display);
            font-weight: 700;
            line-height: 0.78;
            letter-spacing: -0.11em;
            opacity: 0.055;
            pointer-events: none;
            transform: scale(2.6);
            transform-origin: top right;
          }

          .compare-header,
          .compare-body {
            position: relative;
            z-index: 1;
            min-width: 0;
          }

          .compare-header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 29rem);
            align-items: end;
            gap: 3rem;
          }

          .compare-eyebrow,
          .compare-context,
          .compare-side-index,
          .compare-side-title,
          .compare-label,
          .compare-delta,
          .compare-vs {
            font-size: var(--compare-type-small);
          }

          .compare-eyebrow,
          .compare-context,
          .compare-side-index,
          .compare-delta,
          .compare-vs {
            font-family: ui-monospace, "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
            font-variant-numeric: tabular-nums;
          }

          .compare-eyebrow {
            width: max-content;
            max-width: 100%;
            margin: 0 0 1.05rem;
            color: var(--compare-muted);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
          }

          .compare-title {
            max-width: 100%;
            margin: 0;
            color: var(--compare-ink);
            font-size: var(--compare-type-title);
            font-weight: 820;
            line-height: 0.98;
            letter-spacing: -0.03em;
            word-break: keep-all;
            overflow-wrap: anywhere;
          }

          .compare-context {
            justify-self: end;
            max-width: 29rem;
            margin: 0 0 0.25rem;
            color: var(--compare-tertiary);
            font-weight: 620;
            line-height: 1.35;
            letter-spacing: -0.01em;
            text-align: right;
            word-break: keep-all;
            overflow-wrap: anywhere;
          }

          .compare-body {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 11rem minmax(0, 1fr);
            align-items: stretch;
            min-height: 0;
          }

          .compare-side {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            align-items: stretch;
            min-width: 0;
            min-height: 0;
          }

          .compare-side[data-side="left"] {
            padding-right: 5.4rem;
          }

          .compare-side[data-side="right"] {
            padding-left: 5.4rem;
          }

          .compare-side-header {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            min-width: 0;
            padding-bottom: 1.45rem;
            border-bottom: 1px solid var(--compare-hairline);
          }

          .compare-side-index {
            flex: 0 0 auto;
            color: var(--compare-accent);
            font-weight: 740;
            line-height: 1;
            letter-spacing: 0.08em;
          }

          .compare-side[data-side="right"] .compare-side-index {
            color: var(--compare-success);
          }

          .compare-side-title {
            min-width: 0;
            margin: 0;
            color: var(--compare-muted);
            font-weight: 700;
            line-height: 1.12;
            letter-spacing: -0.02em;
            word-break: keep-all;
            overflow-wrap: anywhere;
          }

          .compare-list {
            display: grid;
            align-content: end;
            gap: 1.4rem;
            min-width: 0;
            min-height: 0;
            margin: 0;
            padding: 2rem 0 0;
            list-style: none;
          }

          .compare-item {
            display: grid;
            align-content: end;
            gap: 0.72rem;
            min-width: 0;
            opacity: 1;
          }

          .compare-item + .compare-item {
            padding-top: 1.35rem;
            border-top: 1px solid var(--compare-hairline);
          }

          .compare-item[data-priority="hero"] {
            min-height: 27rem;
            padding-bottom: 1.1rem;
          }

          .compare-label {
            min-width: 0;
            margin: 0;
            color: var(--compare-muted);
            font-weight: 650;
            line-height: 1.2;
            letter-spacing: -0.01em;
            word-break: keep-all;
            overflow-wrap: anywhere;
          }

          .compare-value {
            display: block;
            min-width: 0;
            color: var(--compare-accent);
            font-family: ui-monospace, "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
            font-size: var(--compare-type-small);
            font-weight: 750;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            letter-spacing: -0.03em;
            word-break: keep-all;
            overflow-wrap: anywhere;
          }

          .compare-item[data-priority="hero"] .compare-value {
            color: var(--compare-ink);
            font-size: var(--compare-type-display);
            font-weight: 760;
            line-height: 0.9;
            letter-spacing: -0.055em;
            white-space: nowrap;
          }

          .compare-side[data-side="right"] .compare-item[data-priority="hero"] .compare-value {
            color: var(--compare-accent);
          }

          .compare-item[data-priority="hero"][data-value-kind="text"] .compare-value,
          .compare-item[data-priority="hero"][data-value-kind="empty"] .compare-value {
            max-width: 100%;
            font-family: "Pretendard", "Pretendard Variable", system-ui, sans-serif;
            font-variant-numeric: normal;
            line-height: 0.96;
            letter-spacing: -0.04em;
            white-space: normal;
          }

          .compare-divider {
            position: relative;
            display: grid;
            grid-template-rows: 1fr auto auto 1fr;
            justify-items: center;
            align-items: center;
            min-width: 0;
            min-height: 0;
          }

          .compare-divider-line {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            display: block;
            width: 1px;
            background: var(--compare-hairline-strong);
            transform: translateX(-50%) scaleY(0);
            transform-origin: center;
          }

          .compare-vs,
          .compare-delta {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            min-width: 4.25rem;
            min-height: 2.5rem;
            padding: 0.45rem 0.72rem;
            border: 1px solid var(--compare-hairline-strong);
            border-radius: 999px;
            background: var(--compare-surface);
            font-weight: 760;
            line-height: 1;
            letter-spacing: 0.02em;
            white-space: nowrap;
          }

          .compare-vs {
            grid-row: 2;
            color: var(--compare-accent);
          }

          .compare-delta {
            grid-row: 3;
            margin-top: 0.75rem;
            color: var(--compare-success);
          }

          @keyframes compare-value-living {
            0% {
              opacity: 0.82;
              filter: brightness(0.98);
            }
            100% {
              opacity: 1;
              filter: brightness(1.14);
            }
          }

          @keyframes compare-chip-living {
            0% {
              opacity: 0.82;
              filter: brightness(0.98);
            }
            100% {
              opacity: 1;
              filter: brightness(1.2);
            }
          }

          .compare-item[data-priority="hero"] .compare-value {
            animation: compare-value-living 1.8s ease-in-out calc(var(--rf-scene-start, 0s) + 1.2s) infinite alternate;
          }

          .compare-delta,
          .compare-vs {
            animation: compare-chip-living 1.6s ease-in-out calc(var(--rf-scene-start, 0s) + 1.2s) infinite alternate;
          }

          #compare-root[data-variant="stack"] {
            --compare-type-display: 8.5rem;
          }

          #compare-root[data-variant="stack"] .compare-stage {
            inset: 6.5% 6.25%;
            gap: 1.4rem;
          }

          #compare-root[data-variant="stack"] .compare-header {
            grid-template-columns: minmax(0, 1fr) minmax(0, 25rem);
          }

          #compare-root[data-variant="stack"] .compare-body {
            grid-template-columns: minmax(0, 1fr);
            grid-template-rows: minmax(0, 1fr) 7.25rem minmax(0, 1fr);
          }

          #compare-root[data-variant="stack"] .compare-side[data-side="left"],
          #compare-root[data-variant="stack"] .compare-side[data-side="right"] {
            padding: 0;
          }

          #compare-root[data-variant="stack"] .compare-side {
            grid-template-columns: minmax(0, 21rem) minmax(0, 1fr);
            grid-template-rows: minmax(0, 1fr);
            column-gap: 2.1rem;
          }

          #compare-root[data-variant="stack"] .compare-side-header {
            display: grid;
            align-content: end;
            gap: 0.7rem;
            padding: 0 2.1rem 1.3rem 0;
            border-right: 1px solid var(--compare-hairline);
            border-bottom: 0;
          }

          #compare-root[data-variant="stack"] .compare-list {
            padding: 0 0 0 0.2rem;
          }

          #compare-root[data-variant="stack"] .compare-item[data-priority="hero"] {
            min-height: 15rem;
            padding-bottom: 0;
          }

          #compare-root[data-variant="stack"] .compare-divider {
            grid-template-columns: 1fr auto auto 1fr;
            grid-template-rows: minmax(0, 1fr);
          }

          #compare-root[data-variant="stack"] .compare-divider-line {
            top: 50%;
            right: 0;
            bottom: auto;
            left: 0;
            width: auto;
            height: 1px;
            transform: translateY(-50%) scaleX(0);
          }

          #compare-root[data-variant="stack"] .compare-vs {
            grid-column: 2;
            grid-row: 1;
          }

          #compare-root[data-variant="stack"] .compare-delta {
            grid-column: 3;
            grid-row: 1;
            margin: 0 0 0 0.75rem;
          }
        </style>

        <span class="compare-ghost" aria-hidden="true">Δ</span>
        <section class="compare-stage">
          <header class="compare-header">
            <div>
              <p class="compare-eyebrow" data-compare-mood></p>
              <h1 class="compare-title" data-compare-title></h1>
            </div>
            <p class="compare-context" data-compare-context></p>
          </header>

          <div class="compare-body">
            <article class="compare-side" data-side="left">
              <header class="compare-side-header">
                <span class="compare-side-index">01</span>
                <h2 class="compare-side-title" data-compare-left-title></h2>
              </header>
              <ol class="compare-list" data-compare-left-list></ol>
            </article>

            <div class="compare-divider" aria-hidden="true">
              <span class="compare-divider-line"></span>
              <span class="compare-vs">VS</span>
              <span class="compare-delta" data-compare-delta></span>
            </div>

            <article class="compare-side" data-side="right">
              <header class="compare-side-header">
                <span class="compare-side-index">02</span>
                <h2 class="compare-side-title" data-compare-right-title></h2>
              </header>
              <ol class="compare-list" data-compare-right-list></ol>
            </article>
          </div>
        </section>

        <script>
          (function () {
            const root =
              document.querySelector("#compare-root") ||
              document.querySelector('[data-hf-authored-id="compare-root"]') ||
              document.querySelector('[data-hf-inner-root="true"]');
            const host =
              root.parentElement?.closest("[data-variable-values]") ||
              root.closest("[data-variable-values]") ||
              root.closest("[data-composition-id]") ||
              root;
            const scopedHyperframes = typeof __hyperframes === "undefined" ? null : __hyperframes;
            const hostCompositionId = host.getAttribute("data-composition-id");
            const variables = {
              ...(window.__hyperframes?.getVariables?.() ?? {}),
              ...(scopedHyperframes?.getVariables?.() ?? {}),
              ...((hostCompositionId && globalThis.__hfVariablesByComp?.[hostCompositionId]) || {}),
              ...readHostVariables(host)
            };

            const title = stringValue(variables.title, "비교");
            const source = stringValue(variables.source, "");
            const unit = displayUnit(variables.unit);
            const sideLabels = {
              left: stringValue(variables.leftLabel, ""),
              right: stringValue(variables.rightLabel, "")
            };
            const groups = groupRows(arrayValue(variables.items), arrayValue(variables.values), title, sideLabels);
            const duration = blockDuration(root, 5);
            const phases = phaseTimes(duration);
            const repeatIndex = numberValue(variables.repeatIndex, 0);
            const isStackVariant = repeatIndex % 2 === 1;

            root.style.setProperty("--compare-accent", safeColor(variables.accent));
            root.dataset.variant = isStackVariant ? "stack" : "split";
            root.dataset.hasContext = source ? "true" : "false";
            root.querySelector("[data-compare-title]").textContent = title;
            root.querySelector("[data-compare-mood]").textContent = String(variables.mood || "compare").toUpperCase();
            root.querySelector("[data-compare-context]").textContent = source;
            if (!source) root.querySelector(".compare-context").remove();
            root.querySelector("[data-compare-left-title]").textContent = groups.leftTitle;
            root.querySelector("[data-compare-right-title]").textContent = groups.rightTitle;
            root.setAttribute("aria-label", ariaLabel(title, groups, unit));

            const leftEntries = renderRows(
              root.querySelector("[data-compare-left-list]"),
              groups.left,
              unit,
              groups.leftTitle
            );
            const rightEntries = renderRows(
              root.querySelector("[data-compare-right-list]"),
              groups.right,
              unit,
              groups.rightTitle
            );
            const delta = deltaText(leftEntries[0]?.row, rightEntries[0]?.row, unit);
            root.querySelector("[data-compare-delta]").textContent = delta;

            window.__timelines = window.__timelines || {};
            const tl = gsap.timeline({ paused: true });
            const header = root.querySelector(".compare-header");
            const leftHeader = root.querySelector('[data-side="left"] .compare-side-header');
            const rightHeader = root.querySelector('[data-side="right"] .compare-side-header');
            const leftHero = leftEntries[0];
            const rightHero = rightEntries[0];
            const divider = root.querySelector(".compare-divider");
            const dividerLine = root.querySelector(".compare-divider-line");
            const vs = root.querySelector(".compare-vs");
            const deltaEl = root.querySelector(".compare-delta");
            const supportingRows = leftEntries.slice(1).concat(rightEntries.slice(1));
            const dividerFrom = isStackVariant ? { scaleX: 0 } : { scaleY: 0 };
            const dividerTo = isStackVariant
              ? { scaleX: 1, duration: 0.18, ease: "expo.out" }
              : { scaleY: 1, duration: 0.18, ease: "expo.out" };

            tl.addLabel("start", 0);
            tl.fromTo(header, { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.2, ease: "power3.out" }, 0);
            tl.fromTo(leftHeader, { opacity: 0, x: -16 }, { opacity: 1, x: 0, duration: 0.16, ease: "power2.out" }, 0.08);
            if (leftHero) {
              tl.fromTo(
                leftHero.item,
                { opacity: 0, y: 24, scale: 0.985 },
                { opacity: 1, y: 0, scale: 1, duration: 0.24, ease: "power3.out" },
                0.16
              );
            }
            tl.fromTo(divider, { opacity: 0 }, { opacity: 1, duration: 0.1, ease: "power2.out" }, 0.29);
            tl.fromTo(dividerLine, dividerFrom, dividerTo, 0.3);
            tl.fromTo(vs, { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.16, ease: "power2.out" }, 0.38);
            tl.fromTo(rightHeader, { opacity: 0, x: 16 }, { opacity: 1, x: 0, duration: 0.16, ease: "power2.out" }, 0.38);
            if (rightHero) {
              tl.fromTo(
                rightHero.item,
                { opacity: 0, y: 24, scale: 0.985 },
                { opacity: 1, y: 0, scale: 1, duration: 0.24, ease: "power3.out" },
                0.46
              );
            }
            tl.fromTo(deltaEl, { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.14, ease: "power2.out" }, 0.58);
            if (leftHero) {
              tl.to(leftHero.item, { opacity: 0.74, duration: 0.12, ease: "power2.out" }, 0.52);
            }
            supportingRows.forEach((entry, index) => {
              const start = 0.72 + index * 0.1;
              tl.fromTo(
                entry.item,
                { opacity: 0, y: 12 },
                { opacity: 1, y: 0, duration: 0.14, ease: "power2.out" },
                start
              );
            });

            if (leftHero?.row.valueKind === "number") {
              addCountUp(leftHero.row, leftHero.value, phases.leftCountStart);
            }
            if (rightHero?.row.valueKind === "number") {
              addCountUp(rightHero.row, rightHero.value, phases.rightCountStart);
            }

            tl.addLabel("final", duration);
            timelineIds(root).forEach((id) => {
              if (id) window.__timelines[id] = tl;
            });
            globalThis.__timelines = window.__timelines;
            timelineIds(root).forEach((id) => {
              if (id) globalThis.__timelines[id] = tl;
            });
            signalRuntimeReady();

            function addCountUp(row, target, start) {
              const counter = { value: 0 };
              const halfDuration = phases.countDuration / 2;
              const update = function () {
                target.textContent = formatNumber(counter.value, row.decimals) + unit;
              };
              tl.to(
                counter,
                {
                  value: row.numeric * 0.5,
                  duration: halfDuration,
                  ease: "power2.out",
                  onUpdate: update
                },
                start
              );
              tl.to(
                counter,
                {
                  value: row.numeric,
                  duration: halfDuration,
                  ease: "power2.out",
                  onUpdate: update,
                  onComplete: function () {
                    target.textContent = formatDisplayValue(row, unit);
                  }
                },
                start + halfDuration
              );
            }

            function renderRows(list, rows, suffix, sideTitle) {
              list.dataset.rowCount = String(rows.length);
              return rows.map((row, index) => {
                const item = document.createElement("li");
                const label = document.createElement("p");
                const value = document.createElement("span");
                const priority = index === 0 ? "hero" : "support";
                const showLabel =
                  row.valueKind !== "empty" && normalizedText(row.label) !== normalizedText(sideTitle);

                item.className = "compare-item";
                item.dataset.priority = priority;
                item.dataset.valueKind = row.valueKind;
                label.className = "compare-label";
                value.className = "compare-value";
                label.textContent = row.label;
                value.textContent =
                  row.valueKind === "number" && priority === "hero"
                    ? formatNumber(0, row.decimals) + suffix
                    : displayValue(row, suffix);
                if (row.valueKind === "number" && priority === "hero") value.__rfRow = row;
                if (showLabel) item.append(label);
                item.append(value);
                list.appendChild(item);
                return { item, value, row };
              });
            }

            function groupRows(labels, rawValues, fallbackTitle, suppliedSideLabels) {
              const rows = normalizeRows(labels, rawValues, fallbackTitle);
              const left = [];
              const right = [];
              const neutral = [];
              for (const row of rows) {
                const side = sideForLabel(row.label);
                if (side === "left") left.push(row);
                else if (side === "right") right.push(row);
                else neutral.push(row);
              }

              if (left.length > 0 && right.length > 0) {
                neutral.forEach((row, index) => {
                  (index % 2 === 0 ? left : right).push(row);
                });
              } else if (left.length > 0) {
                right.push(...neutral);
              } else if (right.length > 0) {
                left.push(...neutral);
              } else {
                const midpoint = Math.max(1, Math.ceil(rows.length / 2));
                left.push(...rows.slice(0, midpoint));
                right.push(...rows.slice(midpoint));
              }

              const leftTitle = stringValue(suppliedSideLabels.left, titleForRows(left, "기존"));
              const rightTitle = stringValue(suppliedSideLabels.right, titleForRows(right, "신규"));
              if (left.length === 0) {
                left.push(emptyRow(leftTitle || "비교 대상"));
              }
              if (right.length === 0) {
                right.push(emptyRow(rightTitle || "비교 대상"));
              }

              return { left, right, leftTitle, rightTitle };
            }

            function emptyRow(label) {
              return { label, raw: "", description: "", valueKind: "empty", numeric: 0, decimals: 0 };
            }

            function normalizeRows(labels, rawValues, fallbackTitle) {
              const count = Math.max(labels.length, rawValues.length);
              if (count === 0) return [emptyRow(fallbackTitle)];
              const rows = [];
              for (let index = 0; index < count; index += 1) {
                const raw = rawValues[index];
                const value = valueMeta(raw, labels[index]);
                rows.push({
                  label: stringValue(labels[index], "항목 " + String(index + 1)),
                  raw,
                  description: value.description,
                  valueKind: value.kind,
                  numeric: value.numeric,
                  decimals: value.decimals
                });
              }
              return rows;
            }

            function sideForLabel(label) {
              const text = String(label).toLowerCase();
              if (/(기존|이전|현재|전|old|previous|before|baseline)/i.test(text)) return "left";
              if (/(신규|새|개선|후|new|after|target|next)/i.test(text)) return "right";
              return "none";
            }

            function titleForRows(rows, fallback) {
              const labels = rows.map((row) => row.label);
              if (labels.some((label) => /(기존|이전|old|previous|before|baseline)/i.test(label))) return "기존";
              if (labels.some((label) => /(신규|새|new|after|target|next)/i.test(label))) return "신규";
              return fallback;
            }

            function deltaText(leftRow, rightRow, suffix) {
              if (leftRow?.valueKind === "number" && rightRow?.valueKind === "number") {
                const amount = rightRow.numeric - leftRow.numeric;
                const decimals = Math.max(leftRow.decimals, rightRow.decimals);
                const sign = amount > 0 ? "+" : amount < 0 ? "−" : "±";
                return "Δ " + sign + formatNumber(Math.abs(amount), decimals) + suffix;
              }
              return "Δ 비교";
            }

            function arrayValue(value) {
              return Array.isArray(value) ? value : [];
            }

            function readHostVariables(element) {
              const raw = element?.getAttribute("data-variable-values");
              if (!raw) return {};
              try {
                const parsed = JSON.parse(raw);
                return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
              } catch {
                return {};
              }
            }

            function stringValue(value, fallback) {
              if (value === undefined || value === null) return fallback;
              const text = String(value).trim();
              return text.length > 0 ? text : fallback;
            }

            function displayUnit(value) {
              const text = stringValue(value, "");
              if (!text) return "";
              const normalized = text === "％" ? "%" : text.toLowerCase();
              return new Set(["%", "sec", "원", "건", "개", "명", "회", "hex", "점"]).has(normalized)
                ? normalized
                : "";
            }

            function normalizedText(value) {
              return String(value ?? "").trim();
            }

            function numberValue(value, fallback) {
              const number = Number(value);
              return Number.isFinite(number) ? Math.max(0, Math.floor(number)) : fallback;
            }

            function valueMeta(value, label) {
              if (value === undefined || value === null) {
                return { kind: "empty", description: "", numeric: 0, decimals: 0 };
              }
              const text = String(value).trim();
              if (!text || text === normalizedText(label)) {
                return { kind: "empty", description: "", numeric: 0, decimals: 0 };
              }
              if (typeof value === "number" && Number.isFinite(value)) {
                return { kind: "number", description: "", numeric: value, decimals: decimalPlaces(value) };
              }
              const numericMatch = text.replace(/,/g, "").match(/^-?\d+(?:\.\d+)?$/);
              if (numericMatch) {
                return { kind: "number", description: "", numeric: Number(numericMatch[0]), decimals: decimalPlaces(text) };
              }
              return { kind: "text", description: text, numeric: 0, decimals: 0 };
            }

            function decimalPlaces(value) {
              if (typeof value === "number" && Number.isFinite(value) && !Number.isInteger(value)) {
                return Math.min(2, String(value).split(".")[1]?.length ?? 0);
              }
              const match = String(value).replace(/,/g, "").match(/-?\d+\.(\d+)/);
              return match ? Math.min(2, match[1].length) : 0;
            }

            function formatNumber(value, decimals) {
              const fixed = decimals > 0 ? Number(value).toFixed(decimals) : String(Math.round(value));
              return new Intl.NumberFormat("ko-KR", {
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals
              }).format(Number(fixed));
            }

            function formatDisplayValue(row, suffix) {
              if (row.valueKind === "text") return row.description;
              if (row.valueKind === "empty") return row.label;
              return formatNumber(row.numeric, row.decimals) + suffix;
            }

            function displayValue(row, suffix) {
              return formatDisplayValue(row, suffix) || row.label || "항목";
            }

            function ariaLabel(compareTitle, comparisonGroups, suffix) {
              const rowText = (row) => row.label + " " + formatDisplayValue(row, suffix);
              const leftText = comparisonGroups.left.map(rowText).join(", ");
              const rightText = comparisonGroups.right.map(rowText).join(", ");
              return compareTitle + ": " + comparisonGroups.leftTitle + " " + leftText + "; " + comparisonGroups.rightTitle + " " + rightText;
            }

            function safeColor(value) {
              const text = stringValue(value, "");
              return /^[A-Za-z]+$|^#[0-9A-Fa-f]{3,8}$|^var\(--[A-Za-z0-9_-]+\)$|^color-mix\(.+\)$/.test(text)
                ? text
                : "var(--rf-accent, var(--rf-text, currentColor))";
            }

            function blockDuration(element, fallback) {
              let node = element.parentElement;
              while (node) {
                const value = Number(node.getAttribute?.("data-duration"));
                if (Number.isFinite(value) && value > 0) return value;
                node = node.parentElement;
              }
              const own = Number(element.getAttribute("data-duration"));
              return Number.isFinite(own) && own > 0 ? own : fallback;
            }

            function phaseTimes(total) {
              const maxStart = Math.max(0.24, Math.min(0.46, total - 0.74));
              return {
                leftCountStart: 0.24,
                rightCountStart: maxStart,
                countDuration: 0.7
              };
            }

            function timelineIds(rootElement) {
              const runtimeId = typeof __hfTimelineCompId !== "undefined" && __hfTimelineCompId ? __hfTimelineCompId : "";
              if (runtimeId) return new Set([runtimeId]);
              return new Set([
                rootElement?.getAttribute("data-composition-id") || "",
                rootElement?.getAttribute("data-hf-original-composition-id") || "",
                "compare"
              ]);
            }

            function signalRuntimeReady() {
              if (typeof window.__hfForceTimelineRebind === "function") {
                window.__hfForceTimelineRebind();
              }
              if (typeof window.__hfFlushSync === "function") {
                window.__hfFlushSync();
              }
              window.__playerReady = true;
              window.__renderReady = true;
            }
          })();
        </script>
      </div>
    </template>
  </body>
</html>
