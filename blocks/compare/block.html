        <section class="compare-stage">
          <header class="compare-header">
            <div class="compare-title-group">
              <p class="compare-kicker" data-compare-mood></p>
              <h1 class="compare-title" data-compare-title></h1>
            </div>
            <p class="compare-source" data-compare-source></p>
          </header>
          <div class="compare-body">
            <article class="compare-panel" data-side="left">
              <header class="compare-panel-head">
                <h2 class="compare-side-title" data-compare-left-title></h2>
                <span class="compare-side-tag">01</span>
              </header>
              <ol class="compare-list" data-compare-left-list></ol>
            </article>
            <div class="compare-divider" aria-hidden="true">
              <span class="compare-divider-line"></span>
              <span class="compare-vs" aria-hidden="true"></span>
            </div>
            <article class="compare-panel" data-side="right">
              <header class="compare-panel-head">
                <h2 class="compare-side-title" data-compare-right-title></h2>
                <span class="compare-side-tag">02</span>
              </header>
              <ol class="compare-list" data-compare-right-list></ol>
            </article>
          </div>
          <footer class="compare-footer">
            <div class="compare-footnote" data-compare-footnote></div>
            <div class="compare-unit" data-compare-unit></div>
          </footer>
        </section>
        <script>
        (function () {
          const root =
            document.querySelector("#compare-root") ||
            document.querySelector('[data-hf-authored-id="compare-root"]') ||
            document.querySelector('[data-hf-inner-root="true"]');
          const host =
            root.parentElement?.closest("[data-variable-values]") ||
            root.closest("[data-variable-values]") ||
            root.closest("[data-composition-id]") ||
            root;
          const scopedHyperframes = typeof __hyperframes === "undefined" ? null : __hyperframes;
          const hostCompositionId = host.getAttribute("data-composition-id");
          const variables = {
            ...(window.__hyperframes?.getVariables?.() ?? {}),
            ...(scopedHyperframes?.getVariables?.() ?? {}),
            ...((hostCompositionId && globalThis.__hfVariablesByComp?.[hostCompositionId]) || {}),
            ...readHostVariables(host)
          };

          const title = stringValue(variables.title, "비교");
          const source = stringValue(variables.source, "");
          const unit = displayUnit(variables.unit);
          const sideLabels = {
            left: stringValue(variables.leftLabel, ""),
            right: stringValue(variables.rightLabel, "")
          };
          const groups = groupRows(arrayValue(variables.items), arrayValue(variables.values), title, sideLabels);
          const numericRows = groups.left.concat(groups.right).filter((row) => row.valueKind === "number");
          const maxValue = Math.max(1, ...numericRows.map((row) => Math.abs(row.numeric)));
          const duration = blockDuration(root, 5);
          const phases = phaseTimes(duration);
          const repeatIndex = numberValue(variables.repeatIndex, 0);
          const isStackVariant = repeatIndex % 2 === 1;
          const enterAt = (time) => Number((time * phases.enterScale).toFixed(4));
          const enterDuration = (time) => Number(Math.max(0.12, time * phases.enterScale).toFixed(4));
          const enterGap = (time) => Number(Math.max(0.015, time * phases.enterScale).toFixed(4));

          root.style.setProperty("--compare-accent", safeColor(variables.accent));
          root.querySelector("[data-compare-title]").textContent = title;
          root.querySelector("[data-compare-mood]").textContent = "";
          root.querySelector("[data-compare-mood]").setAttribute("aria-hidden", "true");
          root.querySelector("[data-compare-source]").textContent = "";
          root.querySelector("[data-compare-source]").style.opacity = "0";
          root.dataset.hasSideTitles = groups.leftTitle || groups.rightTitle ? "true" : "false";
          root.dataset.cardMode = groups.left.length === 1 && groups.right.length === 1 ? "hero" : "list";
          root.dataset.variant = isStackVariant ? "stack" : "split";
          root.querySelector("[data-compare-left-title]").textContent = groups.leftTitle;
          root.querySelector("[data-compare-right-title]").textContent = groups.rightTitle;
          root.querySelector("[data-compare-footnote]").textContent = source;
          root.querySelector("[data-compare-unit]").textContent = unit ? `단위 ${unit}` : "";
          root.setAttribute("aria-label", ariaLabel(title, groups, unit));

          renderRows(root.querySelector("[data-compare-left-list]"), groups.left, unit, maxValue, groups.leftTitle);
          renderRows(root.querySelector("[data-compare-right-list]"), groups.right, unit, maxValue, groups.rightTitle);

          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });
          const header = root.querySelector(".compare-header");
          const leftPanel = root.querySelector('[data-side="left"]');
          const rightPanel = root.querySelector('[data-side="right"]');
          const divider = root.querySelector(".compare-divider");
          const dividerLine = root.querySelector(".compare-divider-line");
          const vs = root.querySelector(".compare-vs");
          const leftRows = gsap.utils.toArray(root.querySelectorAll('[data-side="left"] .compare-item'));
          const rightRows = gsap.utils.toArray(root.querySelectorAll('[data-side="right"] .compare-item'));
          const fills = gsap.utils.toArray(root.querySelectorAll(".compare-meter-fill"));
          const values = gsap.utils.toArray(root.querySelectorAll(".compare-value"));
          const footer = root.querySelector(".compare-footer");
          const allRows = leftRows.concat(rightRows);
          const sideTags = gsap.utils.toArray(root.querySelectorAll(".compare-side-tag"));
          const dividerFrom = isStackVariant ? { scaleX: 0 } : { scaleY: 0 };
          const dividerTo = isStackVariant ? { scaleX: 1, duration: enterDuration(0.2), ease: "expo.out" } : { scaleY: 1, duration: enterDuration(0.2), ease: "expo.out" };
          const leftPanelFrom = isStackVariant ? { opacity: 0, y: -24 } : { opacity: 0, x: -34 };
          const leftPanelTo = isStackVariant ? { opacity: 1, y: 0, duration: enterDuration(0.22), ease: "power3.out" } : { opacity: 1, x: 0, duration: enterDuration(0.22), ease: "power3.out" };
          const rightPanelFrom = isStackVariant ? { opacity: 0, y: 24 } : { opacity: 0, x: 34 };
          const rightPanelTo = isStackVariant ? { opacity: 1, y: 0, duration: enterDuration(0.22), ease: "power3.out" } : { opacity: 1, x: 0, duration: enterDuration(0.22), ease: "power3.out" };

          tl.fromTo(header, { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: enterDuration(0.22), ease: "power3.out" }, 0);
          tl.fromTo(divider, { opacity: 0 }, { opacity: 1, duration: enterDuration(0.1), ease: "none" }, enterAt(0.05));
          tl.fromTo(dividerLine, dividerFrom, dividerTo, enterAt(0.06));
          tl.fromTo(vs, { opacity: 0, scale: 0.92 }, { opacity: 1, scale: 1, duration: enterDuration(0.18), ease: "back.out(1.4)" }, enterAt(0.12));
          tl.fromTo(leftPanel, leftPanelFrom, leftPanelTo, enterAt(0.06));
          tl.fromTo(leftRows, { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: enterDuration(0.16), ease: "power2.out", stagger: enterGap(0.02) }, enterAt(0.14));
          tl.fromTo(rightPanel, rightPanelFrom, rightPanelTo, enterAt(0.1));
          tl.fromTo(rightRows, { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: enterDuration(0.16), ease: "power2.out", stagger: enterGap(0.02) }, enterAt(0.18));
          tl.fromTo(fills, { scaleX: 0 }, { scaleX: 1, duration: enterDuration(0.18), ease: "power3.out", stagger: enterGap(0.018) }, enterAt(0.2));
          tl.fromTo(values, { opacity: 0, x: 8 }, { opacity: 1, x: 0, duration: enterDuration(0.14), ease: "power2.out", stagger: enterGap(0.018) }, enterAt(0.22));
          values.forEach((valueEl) => {
            const row = valueEl.__rfRow;
            if (!row) return;
            const counter = { value: 0 };
            valueEl.textContent = `${formatNumber(0, row.decimals)}${unit}`;
            tl.to(
              counter,
              {
                value: row.numeric,
                duration: phases.countDuration,
                ease: "power4.out",
                onUpdate: function () {
                  valueEl.textContent = `${formatNumber(counter.value, row.decimals)}${unit}`;
                },
                onComplete: function () {
                  valueEl.textContent = formatDisplayValue(row, unit);
                }
              },
              phases.countStart
            );
            tl.set(valueEl, { textContent: formatDisplayValue(row, unit) }, phases.countEnd);
          });
          tl.fromTo(footer, { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: enterDuration(0.12), ease: "power2.out" }, enterAt(0.3));
          tl.to(leftPanel, {
            opacity: 0.92,
            y: 16,
            scale: 0.99,
            duration: 0.94,
            ease: "sine.inOut",
            repeat: loopRepeat(0.94),
            yoyo: true
          }, phases.livingStart);
          tl.to(rightPanel, {
            y: -20,
            scale: 1.034,
            duration: 1.03,
            ease: "sine.inOut",
            repeat: loopRepeat(1.03),
            yoyo: true
          }, phases.livingStart + 0.06);
          tl.to(sideTags.concat(vs), {
            scale: 1.16,
            y: -5,
            filter: "brightness(1.22)",
            duration: 0.63,
            ease: "sine.inOut",
            repeat: loopRepeat(0.63),
            yoyo: true
          }, phases.livingStart + 0.03);
          allRows.forEach((row, index) => {
            const rowStart = phases.livingStart + index * 0.11;
            tl.to(row, {
              y: index % 2 === 0 ? -18 : 18,
              scale: 1.018,
              filter: "brightness(1.18)",
              duration: 0.74,
              ease: "sine.inOut",
              repeat: loopRepeat(0.74, 0.16),
              repeatDelay: 0.16,
              yoyo: true
            }, rowStart);
          });
          tl.to(root.querySelector(".compare-stage"), { y: -24, duration: phases.exitDuration, ease: "power2.in" }, phases.exitStart);
          tl.addLabel("final", duration);
          timelineIds(root).forEach((id) => {
            if (id) window.__timelines[id] = tl;
          });
          globalThis.__timelines = window.__timelines;
          timelineIds(root).forEach((id) => {
            if (id) globalThis.__timelines[id] = tl;
          });
          signalRuntimeReady();

          function renderRows(list, rows, suffix, maxNumeric, panelTitle) {
            list.dataset.rowCount = String(rows.length);
            rows.forEach((row) => {
              const heroMode = rows.length === 1;
              const item = document.createElement("li");
              const copy = document.createElement("span");
              const label = document.createElement("span");
              const description = document.createElement("span");
              const meter = document.createElement("span");
              const fill = document.createElement("span");
              const value = document.createElement("span");
              const showLabel =
                row.valueKind === "empty" || !(rows.length === 1 && normalizedText(row.label) === normalizedText(panelTitle));

              item.className = "compare-item";
              copy.className = "compare-copy";
              label.className = "compare-label";
              description.className = "compare-description";
              meter.className = "compare-meter";
              fill.className = "compare-meter-fill";
              value.className = "compare-value";
              item.dataset.valueKind = row.valueKind;
              item.dataset.cardMode = heroMode ? "hero" : "list";

              label.textContent = row.label;
              if (!heroMode && !showLabel) {
                label.hidden = true;
                label.style.display = "none";
              }

              copy.append(label);
              if (heroMode) {
                value.textContent = heroDisplayText(row, suffix);
                if (row.valueKind === "number") value.__rfRow = row;
                if (row.valueKind === "empty") {
                  label.hidden = true;
                  label.style.display = "none";
                  item.append(value);
                } else {
                  item.append(value, copy);
                }
              } else if (row.valueKind === "text") {
                description.textContent = row.description;
                copy.append(description);
                item.append(copy);
              } else if (row.valueKind === "number") {
                fill.style.setProperty("--compare-width", `${Math.max(8, (Math.abs(row.numeric) / maxNumeric) * 100).toFixed(3)}%`);
                value.textContent = formatDisplayValue(row, suffix);
                value.__rfRow = row;
                meter.appendChild(fill);
                copy.append(meter);
                item.append(copy, value);
              } else {
                item.append(copy);
              }
              list.appendChild(item);
            });
          }

          function groupRows(labels, rawValues, fallbackTitle, sideLabels) {
            const rows = normalizeRows(labels, rawValues, fallbackTitle);
            const left = [];
            const right = [];
            for (const row of rows) {
              const side = sideForLabel(row.label);
              if (side === "left") left.push(row);
              else if (side === "right") right.push(row);
            }

            if (left.length > 0 && right.length > 0) {
              return {
                left,
                right,
                leftTitle: titleForRows(left, "기존"),
                rightTitle: titleForRows(right, "신규")
              };
            }

            const midpoint = Math.max(1, Math.ceil(rows.length / 2));
            const splitLeft = rows.slice(0, midpoint);
            const splitRight = rows.slice(midpoint);
            return {
              left: splitLeft,
              right: splitRight,
              leftTitle: stringValue(sideLabels.left, stringValue(labels[0], "")),
              rightTitle: stringValue(sideLabels.right, stringValue(labels[midpoint], ""))
            };
          }

          function normalizeRows(labels, rawValues, fallbackTitle) {
            const count = Math.max(labels.length, rawValues.length);
            if (count === 0) {
              return [{ label: fallbackTitle, raw: "", description: "", valueKind: "empty", numeric: 0, decimals: 0 }];
            }
            const rows = [];
            for (let index = 0; index < count; index += 1) {
              const raw = rawValues[index];
              const value = valueMeta(raw, labels[index]);
              rows.push({
                label: stringValue(labels[index], `항목 ${index + 1}`),
                raw,
                description: value.description,
                valueKind: value.kind,
                numeric: value.numeric,
                decimals: value.decimals
              });
            }
            return rows;
          }

          function sideForLabel(label) {
            const text = String(label).toLowerCase();
            if (/(기존|이전|현재|전|old|previous|before|baseline)/i.test(text)) return "left";
            if (/(신규|새|개선|후|new|after|target|next)/i.test(text)) return "right";
            return "none";
          }

          function titleForRows(rows, fallback) {
            const labels = rows.map((row) => row.label);
            if (labels.some((label) => /(기존|이전|old|previous|before|baseline)/i.test(label))) return "기존";
            if (labels.some((label) => /(신규|새|new|after|target|next)/i.test(label))) return "신규";
            return fallback;
          }

          function arrayValue(value) {
            return Array.isArray(value) ? value : [];
          }

          function readHostVariables(element) {
            const raw = element?.getAttribute("data-variable-values");
            if (!raw) return {};
            try {
              const parsed = JSON.parse(raw);
              return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
            } catch {
              return {};
            }
          }

          function stringValue(value, fallback) {
            if (value === undefined || value === null) return fallback;
            const text = String(value).trim();
            return text.length > 0 ? text : fallback;
          }

          function displayUnit(value) {
            const text = stringValue(value, "");
            if (!text) return "";
            const normalized = text === "％" ? "%" : text.toLowerCase();
            return new Set(["%", "sec", "원", "건", "개", "명", "회", "hex", "점"]).has(normalized)
              ? normalized
              : "";
          }

          function normalizedText(value) {
            return String(value ?? "").trim();
          }

          function numberValue(value, fallback) {
            const number = Number(value);
            return Number.isFinite(number) ? Math.max(0, Math.floor(number)) : fallback;
          }

          function valueMeta(value, label) {
            if (value === undefined || value === null) {
              return { kind: "empty", description: "", numeric: 0, decimals: 0 };
            }
            const text = String(value).trim();
            if (!text || text === normalizedText(label)) {
              return { kind: "empty", description: "", numeric: 0, decimals: 0 };
            }
            if (typeof value === "number" && Number.isFinite(value)) {
              return { kind: "number", description: "", numeric: value, decimals: decimalPlaces(value) };
            }
            const numericMatch = text.replace(/,/g, "").match(/^-?\d+(?:\.\d+)?$/);
            if (numericMatch) {
              return { kind: "number", description: "", numeric: Number(numericMatch[0]), decimals: decimalPlaces(text) };
            }
            return { kind: "text", description: text, numeric: 0, decimals: 0 };
          }

          function numericValue(value) {
            if (typeof value === "number" && Number.isFinite(value)) return value;
            const match = String(value).replace(/,/g, "").match(/-?\d+(?:\.\d+)?/);
            return match ? Number(match[0]) : 0;
          }

          function decimalPlaces(value) {
            if (typeof value === "number" && Number.isFinite(value) && !Number.isInteger(value)) {
              return Math.min(2, String(value).split(".")[1]?.length ?? 0);
            }
            const match = String(value).replace(/,/g, "").match(/-?\d+\.(\d+)/);
            return match ? Math.min(2, match[1].length) : 0;
          }

          function formatNumber(value, decimals) {
            const fixed = decimals > 0 ? Number(value).toFixed(decimals) : String(Math.round(value));
            return new Intl.NumberFormat("ko-KR", {
              minimumFractionDigits: decimals,
              maximumFractionDigits: decimals
            }).format(Number(fixed));
          }

          function formatDisplayValue(row, suffix) {
            if (row.valueKind === "text") return row.description;
            if (row.valueKind === "empty") return "";
            return `${formatNumber(row.numeric, row.decimals)}${suffix}`;
          }

          function heroDisplayText(row, suffix) {
            return formatDisplayValue(row, suffix) || row.label || "항목";
          }

          function ariaLabel(compareTitle, groups, suffix) {
            const rowText = (row) => {
              const value = formatDisplayValue(row, suffix);
              return value ? `${row.label} ${value}` : row.label;
            };
            const leftText = groups.left.map(rowText).join(", ");
            const rightText = groups.right.map(rowText).join(", ");
            return `${compareTitle}: ${groups.leftTitle} ${leftText}; ${groups.rightTitle} ${rightText}`;
          }

          function safeColor(value) {
            const text = stringValue(value, "Highlight");
            return /^[A-Za-z]+$|^#[0-9A-Fa-f]{3,8}$|^var\(--[A-Za-z0-9_-]+\)$|^color-mix\(.+\)$/.test(text)
              ? text
              : "Highlight";
          }

          function blockDuration(element, fallback) {
            let node = element.parentElement;
            while (node) {
              const value = Number(node.getAttribute?.("data-duration"));
              if (Number.isFinite(value) && value > 0) return value;
              node = node.parentElement;
            }
            const own = Number(element.getAttribute("data-duration"));
            return Number.isFinite(own) && own > 0 ? own : fallback;
          }

          function phaseTimes(total) {
            const exitDuration = Math.min(0.44, Math.max(0.32, total * 0.1));
            const exitStart = Math.max(1.35, total - exitDuration);
            const enterScale = 1;
            const countStart = 0.24;
            const countEnd = Math.min(0.98, Math.max(countStart + 0.3, exitStart - 0.12));
            const livingStart = Math.min(exitStart - 0.42, Math.max(countEnd + 0.08, 1.08));
            const livingDuration = Math.max(0.6, exitStart - livingStart);
            return {
              enterScale,
              exitStart,
              exitDuration,
              livingStart,
              livingDuration,
              countStart,
              countEnd,
              countDuration: Math.max(0.3, countEnd - countStart)
            };
          }

          function loopRepeat(cycleDuration, repeatDelay = 0) {
            const span = Math.max(0.1, cycleDuration + repeatDelay);
            return Math.max(2, Math.ceil(72 / span));
          }

          function timelineIds(rootElement) {
            const runtimeId = typeof __hfTimelineCompId !== "undefined" && __hfTimelineCompId ? __hfTimelineCompId : "";
            if (runtimeId) return new Set([runtimeId]);
            return new Set([
              rootElement?.getAttribute("data-composition-id") || "",
              rootElement?.getAttribute("data-hf-original-composition-id") || "",
              "compare"
            ]);
          }

          function signalRuntimeReady() {
            if (typeof window.__hfForceTimelineRebind === "function") {
              window.__hfForceTimelineRebind();
            }
            if (typeof window.__hfFlushSync === "function") {
              window.__hfFlushSync();
            }
            window.__playerReady = true;
            window.__renderReady = true;
          }
        })();
        </script>
      </div>
    </template>
  </body>
</html>
