<!doctype html>
<html
  lang="ko"
  data-composition-variables='[
    {"id":"title","type":"string","label":"Title","default":""},
    {"id":"items","type":"string","label":"Items","default":"[]"},
    {"id":"values","type":"string","label":"Values","default":"[]"},
    {"id":"unit","type":"string","label":"Unit","default":""},
    {"id":"accent","type":"string","label":"Accent","default":"currentColor"},
    {"id":"mood","type":"string","label":"Mood","default":""},
    {"id":"emphasis","type":"string","label":"Emphasis","default":""},
    {"id":"reveal","type":"string","label":"Reveal","default":""},
    {"id":"visualKind","type":"string","label":"Visual Kind","default":""},
    {"id":"source","type":"string","label":"Source","default":""}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>ReelForge Line Block</title>
  </head>
  <body>
    <template>
      <div
        id="line-root"
        data-composition-id="line"
        data-width="1920"
        data-height="1080"
        data-duration="4"
      >
        <style>
        #line-root {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          box-sizing: border-box;
          color: inherit;
          font-family: "Pretendard", "Pretendard Variable", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          overflow: hidden;
          --line-accent: currentColor;
          --line-text: var(--rf-text, currentColor);
          --line-muted: color-mix(in srgb, var(--line-text) 68%, transparent);
          --line-subtle: color-mix(in srgb, var(--line-text) 18%, transparent);
          --line-faint: color-mix(in srgb, var(--line-text) 9%, transparent);
          --line-panel: color-mix(in srgb, var(--line-text) 7%, transparent);
          --line-shadow: var(--rf-shadow, currentColor);
          --line-accent-soft: color-mix(in srgb, var(--line-accent) 20%, transparent);
          --line-accent-faint: color-mix(in srgb, var(--line-accent) 10%, transparent);
        }

        .line-stage {
          position: absolute;
          inset: 0;
          display: grid;
          grid-template-rows: auto 1fr;
          gap: 2rem;
          box-sizing: border-box;
          padding: 4.75rem 6rem 8.5rem;
        }

        .line-heading {
          display: grid;
          grid-template-columns: minmax(0, 1fr) auto;
          align-items: end;
          gap: 2rem;
        }

        .line-kicker {
          margin: 0 0 0.75rem;
          width: 5.5rem;
          height: 0.35rem;
          background: var(--line-accent);
          color: var(--line-muted);
          font-size: 1.625rem;
          font-weight: 760;
          line-height: 1;
          letter-spacing: 0;
          text-transform: uppercase;
        }

        .line-title {
          margin: 0;
          color: var(--line-text);
          font-family: "Pretendard", "Pretendard Variable", system-ui, sans-serif;
          font-size: 5.65rem;
          font-weight: 900;
          line-height: 1.05;
          letter-spacing: -0.03em;
          word-break: keep-all;
          overflow-wrap: anywhere;
          text-wrap: balance;
          text-shadow: 0 0.18rem 1rem color-mix(in srgb, var(--line-shadow) 34%, transparent);
        }

        .line-unit {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          min-width: 8.5rem;
          min-height: 3.75rem;
          box-sizing: border-box;
          padding: 0.75rem 1.5rem;
          border: 0.125rem solid var(--line-subtle);
          color: var(--line-text);
          background: var(--line-panel);
          font-size: 1.875rem;
          font-weight: 850;
          line-height: 1.05;
          letter-spacing: 0;
          white-space: nowrap;
        }

        .line-chart-shell {
          position: relative;
          min-height: 0;
          border: 0.125rem solid var(--line-subtle);
          background:
            linear-gradient(90deg, var(--line-accent-faint), transparent 44%),
            var(--line-panel);
          box-shadow: 0 1.5rem 4rem color-mix(in srgb, var(--line-text) 14%, transparent);
          overflow: hidden;
          transform-origin: 50% 50%;
          will-change: transform, opacity;
        }

        .line-chart-shell::before {
          content: "";
          position: absolute;
          inset: 1.5rem;
          border: 0.0625rem solid var(--line-faint);
          pointer-events: none;
        }

        .line-svg {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          overflow: visible;
        }

        .line-grid {
          stroke: var(--line-faint);
          stroke-width: 2;
          vector-effect: non-scaling-stroke;
        }

        .line-axis {
          stroke: var(--line-subtle);
          stroke-width: 3;
          vector-effect: non-scaling-stroke;
        }

        .line-area {
          fill: var(--line-accent-soft);
          opacity: 0.55;
        }

        .line-path {
          fill: none;
          stroke: var(--line-accent);
          stroke-width: 10;
          stroke-linecap: round;
          stroke-linejoin: round;
          filter: drop-shadow(0 0.5rem 1rem var(--line-accent-soft));
        }

        .line-marker {
          display: none;
        }

        .line-point {
          fill: var(--line-accent);
          stroke: color-mix(in srgb, var(--line-text) 96%, transparent);
          stroke-width: 7;
          transform-box: fill-box;
          transform-origin: center;
          filter: drop-shadow(0 0.35rem 0.7rem var(--line-accent-soft));
          will-change: transform, opacity;
        }

        .line-point[data-highlight="false"] {
          fill: color-mix(in srgb, var(--line-muted) 45%, transparent);
          stroke: var(--line-faint);
          filter: none;
        }

        .line-value,
        .line-label,
        .line-y-label,
        .line-source {
          fill: var(--line-text);
          font-family: "Pretendard", "Pretendard Variable", system-ui, sans-serif;
          letter-spacing: 0;
        }

        .line-value {
          font-size: 44px;
          font-weight: 900;
          text-anchor: middle;
        }

        .line-value[data-anchor="start"],
        .line-label[data-anchor="start"] {
          text-anchor: start;
        }

        .line-value[data-anchor="end"],
        .line-label[data-anchor="end"] {
          text-anchor: end;
        }

        .line-label {
          fill: var(--line-muted);
          font-size: 34px;
          font-weight: 760;
          text-anchor: middle;
        }

        .line-y-label {
          fill: var(--line-muted);
          font-size: 28px;
          font-weight: 720;
          text-anchor: start;
        }

        .line-source {
          fill: var(--line-muted);
          font-size: 26px;
          font-weight: 650;
          text-anchor: end;
        }

        .line-end-label {
          fill: var(--line-text);
          font-size: 34px;
          font-weight: 900;
          text-anchor: end;
          font-variant-numeric: tabular-nums;
        }

        .line-empty {
          position: absolute;
          inset: 0;
          display: none;
          align-items: center;
          justify-content: center;
          padding: 4rem;
          color: var(--line-muted);
          font-size: 3rem;
          font-weight: 800;
          line-height: 1.15;
          letter-spacing: 0;
          text-align: center;
          word-break: keep-all;
        }

        #line-root[data-empty="true"] .line-svg {
          display: none;
        }

        #line-root[data-empty="true"] .line-empty {
          display: flex;
        }
      </style>
        <section class="line-stage" aria-label="라인차트">
          <header class="line-heading">
            <div>
              <p id="line-kicker" class="line-kicker" aria-hidden="true"></p>
              <h1 id="line-title" class="line-title"></h1>
            </div>
            <div id="line-unit" class="line-unit"></div>
          </header>
          <figure class="line-chart-shell">
            <svg
              id="line-svg"
              class="line-svg"
              viewBox="0 0 1440 620"
              role="img"
              aria-labelledby="line-title"
              preserveAspectRatio="none"
            ></svg>
            <div class="line-empty">표시할 데이터가 없습니다</div>
          </figure>
        </section>
      <script>
        (function () {
          window.__timelines = window.__timelines || {};

          const root = document.getElementById("line-root");
          const svg = document.getElementById("line-svg");
          const title = document.getElementById("line-title");
          const unitBadge = document.getElementById("line-unit");
          const kicker = document.getElementById("line-kicker");
          const isVariableBag = (value) => value && typeof value === "object" && !Array.isArray(value);
          const hasChartData = (value) => isVariableBag(value) && Array.isArray(value.items) && Array.isArray(value.values);
          const decodeAttr = (value) =>
            String(value || "")
              .replaceAll("&quot;", '"')
              .replaceAll("&#34;", '"')
              .replaceAll("&#39;", "'")
              .replaceAll("&apos;", "'")
              .replaceAll("&amp;", "&");
          const parseVariableJson = (value) => {
            try {
              const parsed = JSON.parse(decodeAttr(value));
              return isVariableBag(parsed) ? parsed : {};
            } catch {
              return {};
            }
          };
          const hostVariables = () => {
            let node = root;
            while (node) {
              if (node.getAttribute && node.hasAttribute("data-variable-values")) {
                return parseVariableJson(node.getAttribute("data-variable-values"));
              }
              node = node.parentElement;
            }
            return {};
          };
          const registryVariables = () => {
            const byComp = window.__hfVariablesByComp;
            if (!isVariableBag(byComp)) return {};
            const hostId = root && root.parentElement ? root.parentElement.getAttribute("data-composition-id") : "";
            for (const key of ["line", hostId]) {
              if (key && hasChartData(byComp[key])) return byComp[key];
            }
            for (const value of Object.values(byComp)) {
              if (hasChartData(value)) return value;
            }
            return {};
          };
          const documentHostVariables = () => {
            const docs = [document, window.document].filter(Boolean);
            for (const doc of docs) {
              if (typeof doc.querySelectorAll !== "function") continue;
              const hosts = Array.from(doc.querySelectorAll("[data-variable-values]"));
              for (const host of hosts) {
                const source = host.getAttribute("data-composition-src") || "";
                const hostId = host.getAttribute("data-composition-id") || "";
                const candidate = parseVariableJson(host.getAttribute("data-variable-values"));
                if (hasChartData(candidate) && (hostId === "line" || source.includes("line/block.html") || !root || host.contains(root))) {
                  return candidate;
                }
              }
            }
            return {};
          };
          const hyperframeVars =
            window.__hyperframes && typeof window.__hyperframes.getVariables === "function"
              ? window.__hyperframes.getVariables()
              : {};
          const vars = { ...documentHostVariables(), ...registryVariables(), ...hostVariables(), ...hyperframeVars };

          const textOf = (value) => (value === null || value === undefined ? "" : String(value));
          const listOf = (value) => {
            if (Array.isArray(value)) return value;
            if (typeof value === "string" && value.trim().startsWith("[")) {
              try {
                const parsed = JSON.parse(value);
                return Array.isArray(parsed) ? parsed : [];
              } catch {
                return [];
              }
            }
            return [];
          };
          let lineLength = 0;
          const items = listOf(vars.items).map(textOf);
          const rawValues = listOf(vars.values);
          const values = rawValues
            .map((value) => {
              if (typeof value === "number") return value;
              const normalized = textOf(value).replace(/,/g, "").match(/-?\d+(?:\.\d+)?/);
              return normalized ? Number(normalized[0]) : NaN;
            })
            .filter((value) => Number.isFinite(value));
          const count = Math.min(items.length, values.length);
          const unit = displayUnit(vars.unit);
          const source = textOf(vars.source);
          const accent = textOf(vars.accent).trim() || "currentColor";
          const duration = blockDuration(root, 4);
          const phases = phaseTimes(duration);

          root.style.setProperty("--line-accent", accent);
          title.textContent = textOf(vars.title) || "라인차트";
          unitBadge.textContent = "";
          unitBadge.hidden = true;
          unitBadge.style.display = "none";
          kicker.textContent = "";

          const svgNode = (name, attrs = {}) => {
            const node = document.createElementNS("http://www.w3.org/2000/svg", name);
            Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, String(value)));
            return node;
          };

          const fmtValue = (value) => {
            const rounded = Math.round(value * 10) / 10;
            return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(1);
          };
          const fmtTick = (value) => String(Math.round(value));

          if (count < 2) {
            root.dataset.empty = "true";
          } else {
            const chart = {
              width: 1440,
              height: 620,
              left: 132,
              right: 78,
              top: 118,
              bottom: 78
            };
            const plotWidth = chart.width - chart.left - chart.right;
            const plotHeight = chart.height - chart.top - chart.bottom;
            const usedItems = items.slice(0, count);
            const usedValues = values.slice(0, count);
            const minValue = Math.min(...usedValues);
            const maxValue = Math.max(...usedValues);
            const scale = niceScale(minValue, maxValue, 4);
            const yMin = scale.min;
            const yMax = scale.max;
            const yRange = Math.max(1, yMax - yMin);
            const xFor = (index) => chart.left + (plotWidth * index) / Math.max(1, count - 1);
            const yFor = (value) => chart.top + plotHeight - ((value - yMin) / yRange) * plotHeight;
            const points = usedValues.map((value, index) => ({
              x: xFor(index),
              y: yFor(value),
              label: usedItems[index],
              value
            }));

            const gridGroup = svgNode("g", { class: "line-grid-group" });
            const lineGroup = svgNode("g", { class: "line-series" });
            const pointGroup = svgNode("g", { class: "line-points" });
            const labelGroup = svgNode("g", { class: "line-labels" });
            const axisRows = scale.ticks.map((value) => ({
              value,
              y: yFor(value)
            }));

            for (const tick of axisRows) {
              const row = svgNode("g", { class: "line-grid-row" });
              row.appendChild(
                svgNode("line", {
                  class: "line-grid",
                  x1: chart.left,
                  y1: tick.y,
                  x2: chart.width - chart.right,
                  y2: tick.y
                })
              );
              if (cleanNumber(tick.value) !== 0) {
                const yLabel = svgNode("text", {
                  class: "line-y-label",
                  x: chart.left + 18,
                  y: tick.y + 10
                });
                yLabel.textContent = `${fmtTick(tick.value)}${unit}`;
                row.appendChild(yLabel);
              }
              gridGroup.appendChild(row);
            }

            gridGroup.appendChild(
              svgNode("line", {
                class: "line-axis",
                x1: chart.left,
                y1: chart.top + plotHeight,
                x2: chart.width - chart.right,
                y2: chart.top + plotHeight
              })
            );

            const pathD = points
              .map((point, index) => `${index === 0 ? "M" : "L"} ${point.x.toFixed(2)} ${point.y.toFixed(2)}`)
              .join(" ");
            const areaD = `${pathD} L ${points[points.length - 1].x.toFixed(2)} ${(chart.top + plotHeight).toFixed(
              2
            )} L ${points[0].x.toFixed(2)} ${(chart.top + plotHeight).toFixed(2)} Z`;
            const area = svgNode("path", { class: "line-area", d: areaD });
            const path = svgNode("path", { id: "line-path", class: "line-path", d: pathD });

            lineGroup.appendChild(area);
            lineGroup.appendChild(path);

            points.forEach((point, index) => {
              const isFirst = index === 0;
              const isLast = index === points.length - 1;
              let valueAnchor = isFirst ? "start" : isLast ? "end" : "middle";
              let valueX = isFirst ? point.x + 30 : isLast ? point.x - 18 : point.x;
              const valueY = Math.max(40, point.y - 58);
              const labelAnchor = isFirst ? "start" : isLast ? "end" : "middle";
              const labelX = isFirst ? point.x + 4 : isLast ? point.x - 4 : point.x;
              const labelY = Math.max(76, point.y - 22);
              const circle = svgNode("circle", {
                class: "line-point",
                cx: point.x,
                cy: point.y,
                r: 14
              });
              circle.dataset.highlight = index === points.length - 1 ? "true" : "false";
              const value = svgNode("text", {
                class: "line-value",
                "data-anchor": valueAnchor,
                x: valueX,
                y: valueY
              });
              const label = svgNode("text", {
                class: "line-label",
                "data-anchor": labelAnchor,
                x: labelX,
                y: labelY
              });
              value.textContent = `${fmtValue(point.value)}${unit}`;
              label.textContent = point.label;
              pointGroup.appendChild(circle);
              labelGroup.appendChild(value);
              labelGroup.appendChild(label);
            });

            if (source) {
              const sourceText = svgNode("text", {
                class: "line-source",
                x: chart.width - chart.right,
                y: chart.height - 18
              });
              sourceText.textContent = source;
              labelGroup.appendChild(sourceText);
            }

            svg.appendChild(gridGroup);
            svg.appendChild(lineGroup);
            svg.appendChild(pointGroup);
            svg.appendChild(labelGroup);

            lineLength = path.getTotalLength();
            path.style.strokeDasharray = String(lineLength);
            path.style.strokeDashoffset = String(lineLength);
          }

          const tl = gsap.timeline({ paused: true });
          const chartShell = "#line-root .line-chart-shell";
          const detailText = gsap.utils.toArray("#line-root .line-value, #line-root .line-label, #line-root .line-source, #line-root .line-end-label");
          tl.fromTo("#line-root .line-heading", { opacity: 0, y: 28 }, { opacity: 1, y: 0, duration: 0.58, ease: "power3.out" }, 0);
          tl.fromTo(chartShell, { opacity: 0, y: 38, scale: 0.985 }, { opacity: 1, y: 0, scale: 1, duration: 0.72, ease: "power4.out" }, 0.08);
          tl.fromTo("#line-root .line-grid-row", { opacity: 0 }, { opacity: 1, duration: 0.36, stagger: 0.05, ease: "power2.out" }, 0.24);
          tl.fromTo("#line-root .line-area", { opacity: 0 }, { opacity: 0.42, duration: 0.62, ease: "power1.out" }, 0.58);
          tl.fromTo("#line-path", { strokeDashoffset: lineLength }, { strokeDashoffset: 0, duration: Math.min(1.35, phases.livingStart), ease: "power3.inOut" }, 0.62);
          tl.fromTo(
            "#line-root .line-point",
            { opacity: 0, scale: 0 },
            { opacity: 1, scale: 1, duration: 0.32, stagger: 0.12, ease: "back.out(1.4)" },
            0.92
          );
          tl.fromTo(detailText, { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.34, stagger: 0.05, ease: "power2.out" }, 1.04);
          tl.to(chartShell, { y: -10, scale: 1.008, duration: phases.livingDuration, ease: "sine.inOut" }, phases.livingStart);
          tl.to("#line-root .line-point[data-highlight='true']", { scale: 1.18, duration: 1.35, ease: "sine.inOut", repeat: Math.max(1, Math.floor(phases.livingDuration / 1.35)), yoyo: true }, phases.livingStart);
          tl.to("#line-root .line-end-label", { y: -6, duration: phases.livingDuration, ease: "sine.inOut" }, phases.livingStart);
          tl.to("#line-root .line-stage", { y: -24, duration: phases.exitDuration, ease: "power2.in" }, phases.exitStart);
          timelineIds(root).forEach((id) => {
            if (id) window.__timelines[id] = tl;
          });
          globalThis.__timelines = window.__timelines;
          timelineIds(root).forEach((id) => {
            if (id) globalThis.__timelines[id] = tl;
          });
          signalRuntimeReady();

          function timelineIds(rootElement) {
            const runtimeId = typeof __hfTimelineCompId !== "undefined" && __hfTimelineCompId ? __hfTimelineCompId : "";
            if (runtimeId) return new Set([runtimeId]);
            return new Set([
              rootElement?.getAttribute("data-composition-id") || "",
              rootElement?.getAttribute("data-hf-original-composition-id") || "",
              "line"
            ]);
          }

          function signalRuntimeReady() {
            if (typeof window.__hfForceTimelineRebind === "function") {
              window.__hfForceTimelineRebind();
            }
            if (typeof window.__hfFlushSync === "function") {
              window.__hfFlushSync();
            }
            window.__playerReady = true;
            window.__renderReady = true;
          }

          function blockDuration(element, fallback) {
            let node = element.parentElement;
            while (node) {
              const value = Number(node.getAttribute?.("data-duration"));
              if (Number.isFinite(value) && value > 0) return value;
              node = node.parentElement;
            }
            const own = Number(element.getAttribute("data-duration"));
            return Number.isFinite(own) && own > 0 ? own : fallback;
          }

          function phaseTimes(total) {
            const exitDuration = Math.min(0.44, Math.max(0.32, total * 0.1));
            const exitStart = Math.max(1.2, total - exitDuration);
            const livingStart = Math.min(exitStart - 0.42, Math.max(1.22, total * 0.3));
            const livingDuration = Math.max(0.6, exitStart - livingStart);
            return { exitStart, exitDuration, livingStart, livingDuration };
          }

          function niceScale(minValue, maxValue, targetSteps) {
            const startAtZero = minValue >= 0;
            const minBase = startAtZero ? 0 : minValue;
            const rawSpan = Math.max(1, maxValue - minBase);
            const step = Math.max(1, niceStep(rawSpan / Math.max(1, targetSteps)));
            const min = startAtZero ? 0 : Math.floor(minBase / step) * step;
            let max = Math.ceil(maxValue / step) * step;
            if (max <= min) max = min + step * Math.max(1, targetSteps);
            const ticks = [];
            for (let value = min; value <= max + step * 0.5; value += step) {
              ticks.push(cleanNumber(value));
            }
            return { min: cleanNumber(min), max: cleanNumber(max), step, ticks };
          }

          function niceStep(rawStep) {
            if (!Number.isFinite(rawStep) || rawStep <= 0) return 1;
            const exponent = Math.floor(Math.log10(rawStep));
            const base = 10 ** exponent;
            const fraction = rawStep / base;
            const niceFraction = fraction <= 1 ? 1 : fraction <= 2 ? 2 : fraction <= 5 ? 5 : 10;
            return niceFraction * base;
          }

          function cleanNumber(value) {
            return Math.round(value * 1e6) / 1e6;
          }

          function axisLabelCollision({ axisRows, valueX, valueY, chart }) {
            const nearAxis = valueX < chart.left + 132 || valueX > chart.width - chart.right - 132;
            if (!nearAxis) return false;
            return axisRows.some((row) => Math.abs(row.y + 10 - valueY) < 46);
          }

          function displayUnit(value) {
            const text = textOf(value).trim();
            if (!text) return "";
            const normalized = text === "％" ? "%" : text.toLowerCase();
            return new Set(["%", "sec", "원", "건", "개", "명", "회", "hex", "점"]).has(normalized)
              ? normalized
              : "";
          }
        })();
      </script>
      </div>
    </template>
  </body>
</html>
