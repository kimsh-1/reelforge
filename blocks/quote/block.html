<!doctype html>
<html
  lang="ko"
  data-composition-variables='[
    {"id":"title","type":"string","label":"Title","default":"인용"},
    {"id":"items","type":"json","label":"Items","default":[]},
    {"id":"values","type":"json","label":"Values","default":[]},
    {"id":"unit","type":"string","label":"Unit","default":""},
    {"id":"accent","type":"color","label":"Accent","default":"Highlight"},
    {"id":"mood","type":"string","label":"Mood","default":"contemplative"},
    {"id":"emphasis","type":"string","label":"Emphasis","default":"quote"},
    {"id":"reveal","type":"string","label":"Reveal","default":"typewriter"},
    {"id":"visualKind","type":"string","label":"Visual kind","default":"none"},
    {"id":"source","type":"string","label":"Source","default":""}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>ReelForge quote block</title>
  </head>
  <body>
    <template>
      <style>
        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          box-sizing: border-box;
          overflow: hidden;
          color: var(--quote-ink);
          font-family: "Pretendard", "Pretendard Variable", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          --quote-accent: var(--rf-accent, Highlight);
          --quote-ink: var(--rf-text, currentColor);
          --quote-muted: var(--rf-muted-text, color-mix(in srgb, var(--quote-ink) 62%, transparent));
          --quote-surface: var(--rf-surface, color-mix(in srgb, Canvas 94%, transparent));
          --quote-panel: var(--rf-panel, color-mix(in srgb, var(--quote-ink) 7%, transparent));
          --quote-line: color-mix(in srgb, var(--quote-accent) 34%, transparent);
          --quote-line-soft: color-mix(in srgb, var(--quote-ink) 14%, transparent);
          --quote-accent-soft: color-mix(in srgb, var(--quote-accent) 14%, transparent);
          --quote-accent-faint: color-mix(in srgb, var(--quote-accent) 7%, transparent);
          --quote-shadow: var(--rf-shadow, var(--quote-ink));
        }

        .quote-impact-flash,
        .quote-impact-vignette,
        .quote-letterbox {
          position: absolute;
          pointer-events: none;
        }

        .quote-impact-flash {
          inset: 0;
          z-index: 30;
          background: var(--rf-flash, #fff7ea);
          opacity: 0;
          mix-blend-mode: screen;
        }

        .quote-impact-vignette {
          inset: 0;
          z-index: 20;
          background: radial-gradient(ellipse 120% 90% at 50% 45%, transparent 52%, rgba(0, 0, 0, 0.68) 100%);
          opacity: 0;
        }

        .quote-letterbox {
          left: 0;
          right: 0;
          height: 8.5%;
          z-index: 22;
          background: #05080b;
          transform: scaleY(0);
        }

        .quote-letterbox-top {
          top: 0;
          transform-origin: top center;
        }

        .quote-letterbox-bottom {
          bottom: 0;
          transform-origin: bottom center;
        }

        .quote-stage {
          position: absolute;
          inset: 7.963% 7.083% 17.963%;
          display: grid;
          grid-template-columns: minmax(0, 1fr) minmax(25rem, 0.38fr);
          gap: 2.75rem;
          box-sizing: border-box;
        }

        .quote-frame,
        .quote-details {
          min-width: 0;
          box-sizing: border-box;
          border: 0.125rem solid var(--quote-line);
          border-radius: 0.5rem;
          background:
            linear-gradient(135deg, var(--quote-accent-faint), transparent 46%),
            var(--quote-surface);
          box-shadow: 0 1.45rem 4rem color-mix(in srgb, var(--quote-shadow) 14%, transparent);
        }

        .quote-frame {
          position: relative;
          display: grid;
          grid-template-rows: auto minmax(0, 1fr) auto;
          gap: 2.2rem;
          padding: 3.55rem 4.25rem 3.15rem;
          overflow: hidden;
          animation: quote-frame-living 2.15s ease-in-out 1.15s infinite alternate;
        }

        .quote-frame::before {
          content: "“";
          position: absolute;
          top: -2.4rem;
          right: 3rem;
          color: var(--quote-accent-soft);
          font-size: 18rem;
          font-weight: 950;
          line-height: 1;
          pointer-events: none;
          display: none;
        }

        .quote-glyph {
          position: absolute;
          top: -2.4rem;
          right: 3rem;
          color: var(--quote-accent-soft);
          font-size: 18rem;
          font-weight: 950;
          line-height: 1;
          pointer-events: none;
          will-change: transform, opacity;
          animation: quote-glyph-drift 2.6s ease-in-out 1.15s infinite alternate;
        }

        @keyframes quote-glyph-drift {
          0% {
            transform: translate3d(0, 0, 0) rotate(0deg);
          }
          100% {
            transform: translate3d(9px, -13px, 0) rotate(1.3deg);
          }
        }

        @keyframes quote-frame-living {
          0% {
            filter: brightness(1);
          }
          100% {
            filter: brightness(1.09);
          }
        }

        .quote-header {
          position: relative;
          z-index: 1;
          min-width: 0;
          display: grid;
          grid-template-columns: minmax(0, 1fr) auto;
          align-items: start;
          gap: 1.5rem;
        }

        .quote-title-group {
          min-width: 0;
          display: grid;
          gap: 0.88rem;
        }

        .quote-kicker,
        .quote-chip,
        .quote-source-label,
        .quote-detail-label {
          color: var(--quote-muted);
          font-size: 1.16rem;
          font-weight: 780;
          line-height: 1;
          letter-spacing: 0;
          text-transform: uppercase;
        }

        .quote-kicker {
          width: 5.5rem;
          height: 0.35rem;
          box-sizing: border-box;
          padding: 0;
          border: 0;
          border-radius: 0.1rem;
          background: var(--quote-accent);
          overflow-wrap: anywhere;
        }

        .quote-title {
          margin: 0;
          color: var(--quote-ink);
          font-size: 5.15rem;
          font-weight: 930;
          line-height: 1.04;
          letter-spacing: -0.03em;
          word-break: keep-all;
          overflow-wrap: anywhere;
          text-wrap: balance;
          text-shadow: 0 0.18rem 1rem color-mix(in srgb, var(--quote-shadow) 34%, transparent);
        }

        .quote-meta {
          min-width: 0;
          display: flex;
          flex-wrap: wrap;
          justify-content: flex-end;
          gap: 0.65rem;
        }

        .quote-chip {
          max-width: 14rem;
          box-sizing: border-box;
          padding: 0.62rem 0.82rem;
          border: 0.1rem solid var(--quote-line-soft);
          border-radius: 0.5rem;
          background: var(--quote-panel);
          color: var(--quote-muted);
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .quote-body {
          position: relative;
          z-index: 1;
          min-width: 0;
          min-height: 0;
          display: grid;
          align-content: center;
          gap: 1.65rem;
        }

        .quote-rule {
          width: min(18rem, 44%);
          height: 0.38rem;
          background: var(--quote-accent);
          transform-origin: left center;
        }

        .quote-text {
          margin: 0;
          max-width: 61rem;
          color: var(--quote-ink);
          font-size: 5.35rem;
          font-weight: 900;
          line-height: 1.13;
          letter-spacing: -0.03em;
          word-break: keep-all;
          overflow-wrap: anywhere;
          text-wrap: balance;
        }

        .quote-char {
          display: inline-block;
          opacity: 1;
          will-change: transform, opacity;
        }

        .quote-context {
          margin: 0;
          max-width: 52rem;
          color: var(--quote-muted);
          font-size: 2.05rem;
          font-weight: 760;
          line-height: 1.2;
          letter-spacing: 0;
          word-break: keep-all;
          overflow-wrap: anywhere;
        }

        .quote-footer {
          position: relative;
          z-index: 1;
          min-width: 0;
          display: grid;
          grid-template-columns: auto minmax(0, 1fr);
          align-items: center;
          gap: 0.9rem;
          padding-top: 1.25rem;
          border-top: 0.1rem solid var(--quote-line-soft);
        }

        .quote-source {
          min-width: 0;
          color: var(--quote-muted);
          font-size: 1.34rem;
          font-weight: 680;
          line-height: 1.2;
          letter-spacing: 0;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .quote-details {
          display: grid;
          grid-template-rows: auto minmax(0, 1fr);
          gap: 1.55rem;
          padding: 3.1rem 2.55rem;
          overflow: hidden;
        }

        .quote-details-title {
          margin: 0;
          color: var(--quote-muted);
          font-size: 1.38rem;
          font-weight: 820;
          line-height: 1;
          letter-spacing: 0;
          text-transform: uppercase;
        }

        .quote-detail-list {
          min-width: 0;
          margin: 0;
          padding: 0;
          display: grid;
          align-content: center;
          gap: 1.1rem;
          list-style: none;
        }

        .quote-detail {
          min-width: 0;
          min-height: 8.2rem;
          box-sizing: border-box;
          display: grid;
          align-content: center;
          gap: 0.66rem;
          padding: 1.25rem 1.25rem;
          border: 0.1rem solid var(--quote-line-soft);
          border-radius: 0.5rem;
          background: var(--quote-panel);
          opacity: 1;
        }

        .quote-detail:first-child {
          border-color: var(--quote-line);
          background:
            linear-gradient(90deg, var(--quote-accent-soft), transparent 58%),
            var(--quote-panel);
        }

        .quote-detail-value {
          min-width: 0;
          color: var(--quote-ink);
          font-size: 2.28rem;
          font-weight: 890;
          line-height: 1.08;
          letter-spacing: 0;
          word-break: keep-all;
          overflow-wrap: anywhere;
        }

        .quote-detail-note {
          min-width: 0;
          color: var(--quote-muted);
          font-size: 1.28rem;
          font-weight: 700;
          line-height: 1.18;
          letter-spacing: 0;
          overflow-wrap: anywhere;
        }

        #root[data-detail-count="0"] .quote-stage {
          grid-template-columns: minmax(0, 1fr);
        }

        #root[data-detail-count="0"] .quote-details {
          display: none;
        }

        #root[data-reveal-mode="spotlight"] .quote-stage {
          inset: 9.5% 7.083% 17.963%;
          grid-template-columns: minmax(0, 1fr);
        }

        #root[data-reveal-mode="spotlight"] .quote-frame {
          min-height: 42rem;
          align-content: center;
          border-color: color-mix(in srgb, var(--quote-accent) 58%, transparent);
          background:
            linear-gradient(135deg, color-mix(in srgb, var(--quote-accent) 14%, transparent), transparent 48%),
            color-mix(in srgb, var(--quote-surface) 88%, transparent);
        }

        #root[data-reveal-mode="spotlight"] .quote-details {
          display: none;
        }

        #root[data-reveal-mode="spotlight"] .quote-header {
          grid-template-columns: minmax(0, 1fr);
          justify-items: center;
          text-align: center;
        }

        #root[data-reveal-mode="spotlight"] .quote-title-group {
          justify-items: center;
        }

        #root[data-reveal-mode="spotlight"] .quote-title {
          font-size: 8.35rem;
          line-height: 0.95;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          text-align: center;
          text-shadow: 0 0 1.4rem color-mix(in srgb, var(--quote-accent) 30%, transparent);
        }

        #root[data-reveal-mode="spotlight"] .quote-body,
        #root[data-reveal-mode="spotlight"] .quote-footer {
          justify-items: center;
          text-align: center;
        }

        #root[data-reveal-mode="spotlight"] .quote-text {
          max-width: 56rem;
          font-size: 4.2rem;
          letter-spacing: 0;
        }
      </style>
      <div
        id="root"
        data-composition-id="quote"
        data-width="1920"
        data-height="1080"
        data-duration="5"
        role="img"
        aria-label=""
      >
        <span class="quote-impact-vignette" aria-hidden="true"></span>
        <span class="quote-letterbox quote-letterbox-top" aria-hidden="true"></span>
        <span class="quote-letterbox quote-letterbox-bottom" aria-hidden="true"></span>
        <span class="quote-impact-flash" aria-hidden="true"></span>
        <section class="quote-stage">
          <article class="quote-frame">
            <span class="quote-glyph" aria-hidden="true">“</span>
            <header class="quote-header">
              <div class="quote-title-group">
                <p class="quote-kicker" data-quote-mood></p>
                <h1 class="quote-title" data-quote-title></h1>
              </div>
              <div class="quote-meta" data-quote-meta></div>
            </header>
            <div class="quote-body">
              <div class="quote-rule" aria-hidden="true"></div>
              <p class="quote-text" data-quote-text></p>
              <p class="quote-context" data-quote-context></p>
            </div>
            <footer class="quote-footer">
              <span class="quote-source-label">출처</span>
              <span class="quote-source" data-quote-source></span>
            </footer>
          </article>
          <aside class="quote-details" aria-label="인용 세부 정보">
            <p class="quote-details-title">인용 정보</p>
            <ol class="quote-detail-list" data-quote-details></ol>
          </aside>
        </section>
      </div>
      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        (function () {
          const scriptParent = document.currentScript?.parentElement || document;
          const root =
            scriptParent.querySelector(':scope > #root[data-composition-id="quote"]') ||
            scriptParent.querySelector(':scope > #root[data-hf-original-composition-id="quote"]') ||
            scriptParent.querySelector(':scope > [data-hf-inner-root="true"][data-hf-authored-id="root"]') ||
            document.querySelector('#root[data-composition-id="quote"], #root[data-hf-original-composition-id="quote"]') ||
            document.querySelector('[data-composition-id="quote"], [data-hf-original-composition-id="quote"]');
          const host =
            root.parentElement?.closest("[data-variable-values]") ||
            root.closest("[data-variable-values]") ||
            root.parentElement?.closest("[data-composition-id]") ||
            root.closest("[data-composition-id]") ||
            root;
          const variables = readVariables(host);
          const titleEl = root.querySelector("[data-quote-title]");
          const moodEl = root.querySelector("[data-quote-mood]");
          const metaEl = root.querySelector("[data-quote-meta]");
          const quoteEl = root.querySelector("[data-quote-text]");
          const contextEl = root.querySelector("[data-quote-context]");
          const sourceEl = root.querySelector("[data-quote-source]");
          const detailsEl = root.querySelector("[data-quote-details]");

          const title = stringValue(variables.title, "인용");
          const items = arrayValue(variables.items).map((item) => stringValue(item, ""));
          const values = arrayValue(variables.values).map((value) => valueText(value));
          const unit = displayUnit(variables.unit);
          const emphasis = stringValue(variables.emphasis, "quote");
          const reveal = stringValue(variables.reveal, "typewriter");
          const revealMode = reveal.toLowerCase();
          const source = stringValue(variables.source, "");
          const quoteText = stringValue(items[1] || items[0], title);
          const context = stringValue(items[0], unit || title);
          const detailRows = buildDetailRows({ items, values, usedText: [title, quoteText, context] });
          const duration = blockDuration(root, 5);
          const phases = phaseTimes(duration);

          root.style.setProperty("--quote-accent", safeColor(variables.accent));
          root.dataset.detailCount = String(detailRows.length);
          root.dataset.revealMode = revealMode;
          titleEl.textContent = title;
          moodEl.textContent = "";
          moodEl.setAttribute("aria-hidden", "true");
          renderMeta(metaEl, []);
          renderQuoteText(quoteEl, quoteText);
          contextEl.textContent = context;
          sourceEl.textContent = source ? `${source} · ${context}` : context;
          root.setAttribute("aria-label", ariaLabel({ title, quoteText, context, source, detailRows }));

          detailRows.forEach((row) => {
            const item = document.createElement("li");
            const label = document.createElement("span");
            const value = document.createElement("span");
            const note = document.createElement("span");
            item.className = "quote-detail";
            label.className = "quote-detail-label";
            value.className = "quote-detail-value";
            note.className = "quote-detail-note";
            label.textContent = row.label;
            value.textContent = row.value;
            note.textContent = row.note;
            item.append(label, value, note);
            detailsEl.appendChild(item);
          });

          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });
          const chars = gsap.utils.toArray(root.querySelectorAll(".quote-char"));
          const details = gsap.utils.toArray(root.querySelectorAll(".quote-detail"));
          const typewriter = revealMode.includes("type");
          const spotlight = revealMode.includes("spotlight");
          const beatFlash = revealMode.includes("flash");
          const charStagger = chars.length > 0 ? Math.min(0.045, Math.max(0.018, 0.58 / chars.length)) : 0.03;
          const detailStagger = beatFlash ? 0.055 : 0.12;
          const glyph = root.querySelector(".quote-glyph");
          const stage = root.querySelector(".quote-stage");
          const frame = root.querySelector(".quote-frame");
          const rule = root.querySelector(".quote-rule");
          const footer = root.querySelector(".quote-footer");
          const detailsPanel = root.querySelector(".quote-details");
          const flash = root.querySelector(".quote-impact-flash");
          const vignette = root.querySelector(".quote-impact-vignette");
          const letterboxes = gsap.utils.toArray(root.querySelectorAll(".quote-letterbox"));

          if (spotlight) {
            buildSpotlightTimeline();
            registerTimeline(tl);
            return;
          }

          tl.addLabel("start", 0);
          tl.fromTo(
            frame,
            { opacity: 0, y: 36, scale: 0.985 },
            { opacity: 1, y: 0, scale: 1, duration: 0.72, ease: "power4.out" },
            0
          );
          tl.fromTo(glyph, { opacity: 0, scale: 0.82, y: 10 }, { opacity: 1, scale: 1, y: 0, duration: 0.58, ease: "power3.out" }, 0.06);
          tl.fromTo(
            root.querySelector(".quote-details"),
            { opacity: 0, x: 26 },
            { opacity: 1, x: 0, duration: 0.46, ease: "power3.out" },
            0.1
          );
          tl.fromTo(
            rule,
            { scaleX: 0, opacity: 0 },
            { scaleX: 1, opacity: 1, duration: 0.58, ease: "power3.inOut" },
            0.22
          );
          tl.fromTo(
            chars,
            { opacity: 0, y: typewriter ? 10 : 18 },
            {
              opacity: 1,
              y: 0,
              duration: typewriter ? 0.08 : 0.42,
              ease: typewriter ? "none" : "power2.out",
              stagger: typewriter ? charStagger : 0.012
            },
            0.36
          );
          tl.fromTo(
            contextEl,
            { opacity: 0, y: 16 },
            { opacity: 1, y: 0, duration: 0.34, ease: "power2.out" },
            0.72
          );
          tl.fromTo(
            details,
            { opacity: 0, y: 22 },
            { opacity: 1, y: 0, duration: 0.38, ease: "power3.out", stagger: detailStagger },
            0.82
          );
          tl.fromTo(
            footer,
            { opacity: 0, y: 12 },
            { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" },
            1.15
          );
          if (beatFlash) {
            addBeatFlashHits();
          }
          tl.to(glyph, { y: -12, x: 8, rotation: 1.2, duration: phases.livingDuration, ease: "sine.inOut" }, phases.livingStart);
          tl.to(frame, { y: -8, duration: phases.livingDuration, ease: "sine.inOut" }, phases.livingStart);
          tl.to(rule, { scaleX: 0.72, duration: 1.45, ease: "sine.inOut", repeat: Math.max(1, Math.floor(phases.livingDuration / 1.45)), yoyo: true }, phases.livingStart);
          tl.to(stage, { y: -22, duration: phases.exitDuration, ease: "power2.in" }, phases.exitStart);
          tl.addLabel("final", duration);
          registerTimeline(tl);

          function buildSpotlightTimeline() {
            const hit = Math.min(0.58, Math.max(0.34, duration * 0.16));
            const holdDrift = Math.max(0.8, duration - hit - 0.64);
            tl.addLabel("start", 0);
            tl.set([frame, titleEl, quoteEl, contextEl, rule, footer, glyph, detailsPanel], { opacity: 0 }, 0);
            tl.set(stage, { x: 0, y: 0, scale: 1 }, 0);
            tl.fromTo(letterboxes, { scaleY: 0 }, { scaleY: 1, duration: 0.42, ease: "power3.inOut" }, 0);
            tl.to(vignette, { opacity: 0.62, duration: 0.16, ease: "power2.in" }, Math.max(0, hit - 0.22));
            tl.set(flash, { opacity: 1 }, hit);
            tl.set(frame, { opacity: 1, y: 0, scale: 1.12 }, hit);
            tl.set([titleEl, quoteEl], { opacity: 1 }, hit);
            tl.set(glyph, { opacity: 0.72, scale: 1.04, y: 0 }, hit);
            tl.to(flash, { opacity: 0, duration: 0.12, ease: "power3.out" }, hit);
            tl.to(frame, { scale: 1, duration: 0.5, ease: "power4.out" }, hit);
            tl.fromTo(stage, { x: 5, y: -3 }, { x: 0, y: 0, duration: 0.2, ease: "power3.out" }, hit);
            tl.fromTo(rule, { scaleX: 0, opacity: 0 }, { scaleX: 1, opacity: 1, duration: 0.42, ease: "power3.out" }, hit + 0.16);
            tl.fromTo(contextEl, { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.34, ease: "power2.out" }, hit + 0.38);
            tl.fromTo(footer, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.28, ease: "power2.out" }, hit + 0.62);
            tl.to(vignette, { opacity: 0.36, duration: 0.8, ease: "power2.out" }, hit + 0.04);
            tl.to(titleEl, { scale: 1.018, duration: holdDrift, ease: "sine.inOut" }, hit + 0.52);
            tl.to(glyph, { y: -12, x: 8, rotation: 1.2, duration: phases.livingDuration, ease: "sine.inOut" }, phases.livingStart);
            tl.to(stage, { y: -16, duration: phases.exitDuration, ease: "power2.in" }, phases.exitStart);
            tl.addLabel("final", duration);
          }

          function addBeatFlashHits() {
            const targets = details.length > 0 ? details : chars.slice(0, 4);
            const beatStart = 0.82;
            const beatGap = 0.16;
            targets.slice(0, 4).forEach((target, index) => {
              const at = beatStart + index * beatGap;
              tl.set(flash, { opacity: index % 2 === 0 ? 0.58 : 0.42 }, at);
              tl.to(flash, { opacity: 0, duration: 0.07, ease: "power2.out" }, at);
              tl.fromTo(target, { scale: 0.97 }, { scale: 1.045, duration: 0.08, ease: "power3.out", repeat: 1, yoyo: true }, at);
            });
            tl.fromTo(stage, { x: -10 }, { x: 0, duration: 0.2, ease: "power3.out" }, beatStart);
            tl.to(vignette, { opacity: 0.26, duration: 0.1, ease: "none" }, beatStart);
            tl.to(vignette, { opacity: 0, duration: 0.42, ease: "power2.out" }, beatStart + 0.12);
          }

          function registerTimeline(timeline) {
            timelineIds(host, root).forEach((id) => {
              if (id) window.__timelines[id] = timeline;
            });
            globalThis.__timelines = window.__timelines;
            timelineIds(host, root).forEach((id) => {
              if (id) globalThis.__timelines[id] = timeline;
            });
          }

          function arrayValue(value) {
            return Array.isArray(value) ? value : [];
          }

          function stringValue(value, fallback) {
            if (value === undefined || value === null) return fallback;
            const text = String(value).trim();
            return text.length > 0 ? text : fallback;
          }

          function displayUnit(value) {
            const text = stringValue(value, "");
            if (!text) return "";
            const normalized = text === "％" ? "%" : text.toLowerCase();
            return new Set(["%", "sec", "원", "건", "개", "명", "회", "hex", "점"]).has(normalized)
              ? normalized
              : "";
          }

          function valueText(value) {
            if (value === undefined || value === null) return "";
            return String(value).trim();
          }

          function buildDetailRows({ items: itemTexts, values: valueTexts, usedText }) {
            const rows = [];
            const used = new Set(usedText.map(normalizeDetailText).filter(Boolean));
            const max = Math.max(itemTexts.length, valueTexts.length);
            for (let index = 0; index < max; index += 1) {
              const itemText = stringValue(itemTexts[index], "");
              const rawValue = valueTexts[index] || "";
              const displayValue = rawValue || itemText;
              if (!displayValue) continue;
              if (used.has(normalizeDetailText(displayValue)) && !rawValue) continue;
              if (itemText && used.has(normalizeDetailText(itemText)) && (!rawValue || normalizeDetailText(rawValue) === normalizeDetailText(itemText))) {
                continue;
              }
              rows.push({
                label: quoteDetailLabel(rows.length),
                value: displayValue,
                note: rawValue && itemText && normalizeDetailText(rawValue) !== normalizeDetailText(itemText) ? itemText : ""
              });
            }
            return rows.slice(0, 4);
          }

          function quoteDetailLabel(index) {
            if (index === 0) return "맥락";
            if (index === 1) return "문장";
            return `근거 ${index + 1}`;
          }

          function normalizeDetailText(value) {
            return String(value ?? "").trim().replace(/\s+/g, " ");
          }

          function renderMeta(container, entries) {
            entries
              .map((entry) => stringValue(entry, ""))
              .filter(Boolean)
              .slice(0, 3)
              .forEach((entry) => {
                const chip = document.createElement("span");
                chip.className = "quote-chip";
                chip.textContent = entry;
                container.appendChild(chip);
              });
          }

          function renderQuoteText(container, text) {
            container.setAttribute("aria-label", text);
            Array.from(text).forEach((char) => {
              const span = document.createElement("span");
              span.className = "quote-char";
              span.setAttribute("aria-hidden", "true");
              span.textContent = char === " " ? "\u00a0" : char;
              container.appendChild(span);
            });
          }

          function readVariables(hostElement) {
            const direct =
              window.__hyperframes && typeof window.__hyperframes.getVariables === "function"
                ? window.__hyperframes.getVariables()
                : {};
            const scoped = typeof __hyperframes === "undefined" ? {} : __hyperframes.getVariables?.() ?? {};
            const runtimeId = hostElement?.getAttribute("data-composition-id") || "";
            const authoredId = hostElement?.getAttribute("data-hf-original-composition-id") || "quote";
            const registry = {
              ...(globalThis.__hfVariablesByComp?.[authoredId] || {}),
              ...(globalThis.__hfVariablesByComp?.[runtimeId] || {}),
              ...(globalThis.__hfVariablesByComp?.quote || {})
            };
            return { ...readHostVariables(hostElement), ...registry, ...direct, ...scoped };
          }

          function readHostVariables(element) {
            let node = element;
            while (node) {
              if (node.getAttribute && node.hasAttribute("data-variable-values")) {
                try {
                  const parsed = JSON.parse(node.getAttribute("data-variable-values"));
                  return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
                } catch {
                  return {};
                }
              }
              node = node.parentElement;
            }
            return {};
          }

          function timelineIds(hostElement, rootElement) {
            const runtimeId = typeof __hfTimelineCompId !== "undefined" && __hfTimelineCompId ? __hfTimelineCompId : "";
            if (runtimeId) return new Set([runtimeId]);
            return new Set([
              hostElement?.getAttribute("data-composition-id") || "",
              hostElement?.getAttribute("data-hf-original-composition-id") || "",
              rootElement?.getAttribute("data-composition-id") || "",
              rootElement?.getAttribute("data-hf-original-composition-id") || "",
              "quote"
            ]);
          }

          function ariaLabel({ title: labelTitle, quoteText: labelQuote, context: labelContext, source: labelSource, detailRows: rows }) {
            const details = rows.map((row) => `${row.label} ${row.value} ${row.note}`).join(", ");
            return `${labelTitle}: ${labelQuote}. ${labelContext}. ${labelSource}. ${details}`;
          }

          function safeColor(value) {
            const text = stringValue(value, "Highlight");
            return /^[A-Za-z]+$|^#[0-9A-Fa-f]{3,8}$|^var\(--[A-Za-z0-9_-]+\)$|^color-mix\(.+\)$/.test(text)
              ? text
              : "Highlight";
          }

          function blockDuration(element, fallback) {
            let node = element.parentElement;
            while (node) {
              const value = Number(node.getAttribute?.("data-duration"));
              if (Number.isFinite(value) && value > 0) return value;
              node = node.parentElement;
            }
            const own = Number(element.getAttribute("data-duration"));
            return Number.isFinite(own) && own > 0 ? own : fallback;
          }

          function phaseTimes(total) {
            const exitDuration = Math.min(0.44, Math.max(0.32, total * 0.1));
            const exitStart = Math.max(1.2, total - exitDuration);
            const livingStart = Math.min(exitStart - 0.42, Math.max(1.1, total * 0.28));
            const livingDuration = Math.max(0.6, exitStart - livingStart);
            return { exitStart, exitDuration, livingStart, livingDuration };
          }
        })();
      </script>
    </template>
  </body>
</html>
