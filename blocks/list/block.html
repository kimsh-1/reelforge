<!doctype html>
<html
  lang="ko"
  data-composition-variables='[
    {"id":"title","type":"string","label":"Title","default":"목록"},
    {"id":"items","type":"json","label":"Items","default":[]},
    {"id":"values","type":"json","label":"Values","default":[]},
    {"id":"unit","type":"string","label":"Unit","default":""},
    {"id":"accent","type":"color","label":"Accent","default":"Highlight"},
    {"id":"mood","type":"string","label":"Mood","default":"informative"},
    {"id":"emphasis","type":"string","label":"Emphasis","default":"count"},
    {"id":"reveal","type":"string","label":"Reveal","default":"stagger"},
    {"id":"visualKind","type":"string","label":"Visual kind","default":"list"},
    {"id":"source","type":"string","label":"Source","default":""}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>ReelForge list block</title>
  </head>
  <body>
    <template>
      <style>
        .list-rootbox {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          box-sizing: border-box;
          overflow: hidden;
          color: var(--rf-text, currentColor);
          font-family: "Pretendard", "Pretendard Variable", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          --list-accent: var(--rf-accent, Highlight);
          --list-ink: var(--rf-text, currentColor);
          --list-muted: var(--rf-muted-text, color-mix(in srgb, var(--list-ink) 62%, transparent));
          --list-surface: var(--rf-surface, color-mix(in srgb, Canvas 94%, transparent));
          --list-panel: var(--rf-panel, color-mix(in srgb, var(--list-ink) 7%, transparent));
          --list-line: color-mix(in srgb, var(--list-accent) 32%, transparent);
          --list-line-soft: color-mix(in srgb, var(--list-ink) 14%, transparent);
          --list-accent-soft: color-mix(in srgb, var(--list-accent) 14%, transparent);
          --list-shadow: var(--rf-shadow, var(--list-ink));
        }

        .list-stage {
          position: absolute;
          inset: 8.25% 7.25% 15.75%;
          display: grid;
          grid-template-columns: minmax(0, 0.78fr) minmax(42rem, 1.18fr);
          align-items: center;
          gap: 5rem;
          box-sizing: border-box;
        }

        .list-header {
          min-width: 0;
          display: grid;
          align-content: center;
          gap: 1.55rem;
        }

        .list-kicker {
          margin: 0;
          width: 5.5rem;
          height: 0.35rem;
          box-sizing: border-box;
          padding: 0;
          border: 0;
          border-radius: 0.1rem;
          background: var(--list-accent);
          color: var(--list-muted);
          font-size: 1.45rem;
          font-weight: 780;
          line-height: 1;
          letter-spacing: 0;
          text-transform: uppercase;
          overflow-wrap: anywhere;
        }

        .list-title {
          margin: 0;
          color: var(--list-ink);
          font-size: 5.45rem;
          font-weight: 920;
          line-height: 1.04;
          letter-spacing: -0.03em;
          word-break: keep-all;
          overflow-wrap: anywhere;
          text-wrap: balance;
        }

        .list-source {
          margin: 0;
          max-width: 36rem;
          color: var(--list-muted);
          font-size: 1.42rem;
          font-weight: 650;
          line-height: 1.36;
          letter-spacing: 0;
          overflow-wrap: anywhere;
        }

        .list-stack {
          min-width: 0;
          margin: 0;
          padding: 0;
          display: grid;
          gap: 1.15rem;
          list-style: none;
          counter-reset: list-item-count;
        }

        .list-item {
          position: relative;
          min-width: 0;
          min-height: 8.7rem;
          display: grid;
          grid-template-columns: 4.75rem minmax(0, 1fr) auto;
          align-items: center;
          gap: 1.35rem;
          box-sizing: border-box;
          padding: 1.28rem 1.45rem;
          border: 0.1rem solid var(--list-line-soft);
          border-radius: 0.5rem;
          background:
            linear-gradient(90deg, var(--list-accent-soft), transparent 38%),
            var(--list-surface);
          box-shadow: 0 1.15rem 2.8rem color-mix(in srgb, var(--list-shadow) 12%, transparent);
          opacity: 0;
          counter-increment: list-item-count;
          overflow: hidden;
          transform-origin: 50% 50%;
          will-change: transform, filter, opacity;
        }

        .list-icon {
          position: relative;
          width: 4.75rem;
          aspect-ratio: 1;
          display: grid;
          place-items: center;
          border: 0.12rem solid var(--list-line);
          border-radius: 0.5rem;
          background: var(--list-panel);
          overflow: hidden;
          transform-origin: 50% 50%;
          will-change: transform, filter;
        }

        .list-icon::before {
          content: "";
          width: 1.15rem;
          aspect-ratio: 1;
          border-radius: 50%;
          background: var(--list-accent);
          box-shadow: 0 0 1.1rem var(--list-accent-soft);
        }

        .list-icon::after {
          content: counter(list-item-count, decimal-leading-zero);
          position: absolute;
          right: 0.38rem;
          bottom: 0.32rem;
          color: var(--list-muted);
          font-size: 0.95rem;
          font-weight: 820;
          line-height: 1;
          letter-spacing: 0;
        }

        .list-copy {
          min-width: 0;
          display: grid;
          gap: 0.48rem;
        }

        .list-label {
          min-width: 0;
          color: var(--list-ink);
          font-size: 2.55rem;
          font-weight: 850;
          line-height: 1.14;
          letter-spacing: 0;
          word-break: keep-all;
          overflow-wrap: anywhere;
        }

        .list-meta {
          min-width: 0;
          color: var(--list-muted);
          font-size: 1.18rem;
          font-weight: 720;
          line-height: 1.15;
          letter-spacing: 0;
          overflow-wrap: anywhere;
        }

        .list-value {
          max-width: 18rem;
          box-sizing: border-box;
          padding: 0.7rem 1rem;
          border: 0.1rem solid var(--list-line);
          border-radius: 0.5rem;
          background: var(--list-accent-soft);
          color: var(--list-ink);
          font-size: 1.8rem;
          font-weight: 900;
          line-height: 1;
          letter-spacing: 0;
          text-align: center;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
          font-variant-numeric: tabular-nums;
          opacity: 0;
        }

        .list-sweep {
          position: absolute;
          inset: 0;
          background: linear-gradient(100deg, transparent 0 38%, color-mix(in srgb, var(--list-accent) 24%, transparent) 50%, transparent 62% 100%);
          opacity: 0;
          transform: translateX(-120%);
          pointer-events: none;
        }

        .list-item[data-hot="true"] {
          border-color: var(--list-line);
        }

        .list-rootbox[data-has-values="false"] .list-item {
          grid-template-columns: 4.75rem minmax(0, 1fr);
        }

        .list-item[data-has-value="false"] {
          grid-template-columns: 4.75rem minmax(0, 1fr);
        }

        .list-rootbox[data-has-values="false"] .list-value {
          display: none;
        }

        .list-item[data-has-value="false"] .list-value {
          display: none;
        }

        @keyframes list-row-living {
          0% {
            transform: translateY(-0.72rem) scale(1.006);
            filter: brightness(1.04);
          }
          100% {
            transform: translateY(0.72rem) scale(1.018);
            filter: brightness(1.16);
          }
        }

        @keyframes list-icon-pulse {
          0% {
            transform: scale(1.02);
            filter: brightness(1.06);
          }
          100% {
            transform: scale(1.16);
            filter: brightness(1.24);
          }
        }

        @keyframes list-sweep-living {
          0% {
            opacity: 0;
            transform: translateX(-120%);
          }
          28%,
          62% {
            opacity: 0.88;
          }
          100% {
            opacity: 0;
            transform: translateX(120%);
          }
        }

        .list-item {
          animation: list-row-living 2.18s ease-in-out calc(var(--rf-scene-start, 0s) + 1s) infinite alternate;
        }

        .list-item:nth-child(2n) {
          animation-delay: calc(var(--rf-scene-start, 0s) + 1.22s);
          animation-direction: alternate-reverse;
        }

        .list-icon {
          animation: list-icon-pulse 1.64s ease-in-out calc(var(--rf-scene-start, 0s) + 0.92s) infinite alternate;
        }

        .list-sweep {
          animation: list-sweep-living 1.48s ease-in-out 1.05s infinite;
        }
      </style>
      <div
        id="root"
        class="list-rootbox"
        data-composition-id="list"
        data-width="1920"
        data-height="1080"
        data-duration="4"
        role="img"
        aria-label=""
      >
        <section class="list-stage">
          <header class="list-header">
            <p class="list-kicker" data-list-mood></p>
            <h1 class="list-title" data-list-title></h1>
            <p class="list-source" data-list-source></p>
          </header>
          <ol class="list-stack" data-list-items aria-label="목록 항목"></ol>
        </section>
      </div>
      <script>
        (function () {
          const root =
            document.querySelector('[data-hf-inner-root="true"][data-hf-authored-id="root"]') ||
            document.querySelector('[data-hf-inner-root="true"]') ||
            document.querySelector('.list-rootbox[data-composition-id="list"], .list-rootbox[data-hf-original-composition-id="list"]') ||
            document.getElementById("root") ||
            document.querySelector('[data-composition-id="list"], [data-hf-original-composition-id="list"]');
          const host =
            root.parentElement?.closest("[data-variable-values]") ||
            root.closest("[data-variable-values]") ||
            root.parentElement?.closest("[data-composition-id]") ||
            root.closest("[data-composition-id]") ||
            root;
          const titleEl = root.querySelector("[data-list-title]");
          const moodEl = root.querySelector("[data-list-mood]");
          const sourceEl = root.querySelector("[data-list-source]");
          const listEl = root.querySelector("[data-list-items]");
          const variables = readVariables(host);

          const title = stringValue(variables.title, "목록");
          const source = stringValue(variables.source, "");
          const unit = stringValue(variables.unit, "");
          const rows = normalizeRows(arrayValue(variables.items), arrayValue(variables.values), title);
          const duration = blockDuration(root, 4);
          const phases = phaseTimes(duration);

          root.style.setProperty("--list-accent", safeColor(variables.accent));
          root.dataset.hasValues = rows.some((row) => row.value.length > 0) ? "true" : "false";
          titleEl.textContent = title;
          moodEl.textContent = "";
          moodEl.setAttribute("aria-hidden", "true");
          sourceEl.textContent = source;
          sourceEl.style.opacity = source ? "1" : "0";
          root.setAttribute("aria-label", ariaLabel(title, rows, unit));

          rows.forEach((row, index) => {
            const item = document.createElement("li");
            const icon = document.createElement("span");
            const copy = document.createElement("span");
            const label = document.createElement("span");
            const meta = document.createElement("span");
            const value = document.createElement("span");
            const sweep = document.createElement("span");

            item.className = "list-item";
            icon.className = "list-icon";
            copy.className = "list-copy";
            label.className = "list-label";
            meta.className = "list-meta";
            value.className = "list-value";
            sweep.className = "list-sweep";
            item.dataset.hot = index === 0 ? "true" : "false";
            item.dataset.hasValue = row.value.length > 0 ? "true" : "false";

            icon.setAttribute("aria-hidden", "true");
            label.textContent = row.label;
            meta.textContent = unit ? `${unit} · ${index + 1}/${rows.length}` : `${index + 1}/${rows.length}`;
            value.textContent = row.value;

            copy.append(label, meta);
            item.append(sweep, icon, copy);
            if (row.value.length > 0) item.append(value);
            listEl.appendChild(item);
          });

          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });
          const items = gsap.utils.toArray(root.querySelectorAll(".list-item"));
          const icons = gsap.utils.toArray(root.querySelectorAll(".list-icon"));
          const values = gsap.utils.toArray(root.querySelectorAll(".list-value"));

          tl.fromTo(
            root.querySelector(".list-header"),
            { opacity: 0, y: 16 },
            { opacity: 1, y: 0, duration: 0.22, ease: "power3.out" },
            0
          );
          tl.fromTo(
            items,
            { opacity: 0, y: 16, scale: 0.995 },
            { opacity: 1, y: 0, scale: 1, duration: 0.18, ease: "power3.out", stagger: 0.035 },
            0.1
          );
          tl.fromTo(
            icons,
            { opacity: 0, scale: 0.9 },
            { opacity: 1, scale: 1, duration: 0.16, ease: "back.out(1.4)", stagger: 0.035 },
            0.13
          );
          tl.fromTo(
            values,
            { opacity: 0, x: 10 },
            { opacity: 1, x: 0, duration: 0.14, ease: "power2.out", stagger: 0.035 },
            0.18
          );
          const sweeps = gsap.utils.toArray(root.querySelectorAll(".list-sweep"));
          tl.to(root.querySelector(".list-stack"), {
            y: -18,
            duration: 0.94,
            ease: "sine.inOut",
            repeat: loopRepeat(0.94),
            yoyo: true
          }, phases.livingStart);
          sweeps.forEach((sweep, index) => {
            tl.fromTo(
              sweep,
              { opacity: 0, x: "-120%" },
              {
                opacity: 0.88,
                x: "120%",
                duration: 0.56,
                ease: "power2.inOut",
                repeat: loopRepeat(0.56, rows.length * 0.2),
                repeatDelay: rows.length * 0.2
              },
              phases.livingStart + index * 0.2
            );
          });
          items.forEach((item, index) => {
            const rowStart = phases.livingStart + index * 0.08;
            tl.to(item, {
              y: index % 2 === 0 ? -16 : 16,
              scale: 1.018,
              filter: "brightness(1.15)",
              duration: 0.7,
              ease: "sine.inOut",
              repeat: loopRepeat(0.7, 0.18),
              repeatDelay: 0.18,
              yoyo: true
            }, rowStart);
          });
          tl.to(icons, {
            scale: 1.16,
            filter: "brightness(1.22)",
            duration: 0.82,
            ease: "sine.inOut",
            repeat: loopRepeat(0.82),
            yoyo: true
          }, phases.livingStart + 0.06);
          tl.to(root.querySelector(".list-stage"), { y: -20, duration: phases.exitDuration, ease: "power2.in" }, phases.exitStart);
          tl.addLabel("final", duration);
          timelineIds(host, root).forEach((id) => {
            if (id) window.__timelines[id] = tl;
          });
          globalThis.__timelines = window.__timelines;
          timelineIds(host, root).forEach((id) => {
            if (id) globalThis.__timelines[id] = tl;
          });

          function arrayValue(value) {
            return Array.isArray(value) ? value : [];
          }

          function readVariables(hostElement) {
            const direct =
              window.__hyperframes && typeof window.__hyperframes.getVariables === "function"
                ? window.__hyperframes.getVariables()
                : {};
            const runtimeId = hostElement?.getAttribute("data-composition-id") || "";
            const authoredId = hostElement?.getAttribute("data-hf-original-composition-id") || "list";
            const registry = {
              ...(globalThis.__hfVariablesByComp?.[authoredId] || {}),
              ...(globalThis.__hfVariablesByComp?.[runtimeId] || {})
            };
            return { ...readHostVariables(hostElement), ...registry, ...direct };
          }

          function readHostVariables(element) {
            let node = element;
            while (node) {
              if (node.getAttribute && node.hasAttribute("data-variable-values")) {
                try {
                  const parsed = JSON.parse(node.getAttribute("data-variable-values"));
                  return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
                } catch {
                  return {};
                }
              }
              node = node.parentElement;
            }
            return {};
          }

          function timelineIds(hostElement, rootElement) {
            const runtimeId = typeof __hfTimelineCompId !== "undefined" && __hfTimelineCompId ? __hfTimelineCompId : "";
            if (runtimeId) return new Set([runtimeId]);
            return new Set([
              hostElement?.getAttribute("data-composition-id") || "",
              hostElement?.getAttribute("data-hf-original-composition-id") || "",
              rootElement?.getAttribute("data-composition-id") || "",
              rootElement?.getAttribute("data-hf-original-composition-id") || "",
              "list"
            ]);
          }

          function stringValue(value, fallback) {
            if (value === undefined || value === null) return fallback;
            const text = String(value).trim();
            return text.length > 0 ? text : fallback;
          }

          function normalizeRows(labels, rawValues, fallbackTitle) {
            const count = Math.max(labels.length, rawValues.length);
            if (count === 0) {
              return [{ label: fallbackTitle, value: "" }];
            }
            const rows = [];
            for (let index = 0; index < count; index += 1) {
              rows.push({
                label: stringValue(labels[index], `항목 ${index + 1}`),
                value: valueText(rawValues[index], labels[index])
              });
            }
            return rows;
          }

          function valueText(value, label) {
            if (value === undefined || value === null) return "";
            const text = String(value).trim();
            if (!text) return "";
            return text === String(label ?? "").trim() ? "" : text;
          }

          function ariaLabel(listTitle, rows, unitText) {
            const itemText = rows
              .map((row) => (row.value ? `${row.label} ${unitText ? `${unitText} ` : ""}${row.value}` : row.label))
              .join(", ");
            return `${listTitle}: ${itemText}`;
          }

          function safeColor(value) {
            const text = stringValue(value, "Highlight");
            return /^[A-Za-z]+$|^#[0-9A-Fa-f]{3,8}$|^var\(--[A-Za-z0-9_-]+\)$/.test(text) ? text : "Highlight";
          }

          function blockDuration(element, fallback) {
            let node = element.parentElement;
            while (node) {
              const value = Number(node.getAttribute?.("data-duration"));
              if (Number.isFinite(value) && value > 0) return value;
              node = node.parentElement;
            }
            const own = Number(element.getAttribute("data-duration"));
            return Number.isFinite(own) && own > 0 ? own : fallback;
          }

          function phaseTimes(total) {
            const exitDuration = Math.min(0.42, Math.max(0.3, total * 0.1));
            const exitStart = Math.max(1.15, total - exitDuration);
            const livingStart = Math.min(exitStart - 0.42, Math.max(0.72, total * 0.2));
            const livingDuration = Math.max(0.6, exitStart - livingStart);
            return { exitStart, exitDuration, livingStart, livingDuration };
          }

          function loopRepeat(cycleDuration, repeatDelay = 0) {
            const span = Math.max(0.1, cycleDuration + repeatDelay);
            return Math.max(2, Math.ceil(72 / span));
          }
        })();
      </script>
    </template>
  </body>
</html>
