<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ReelForge Studio</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #172033;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      main {
        width: min(680px, calc(100vw - 48px));
        border: 1px solid #d7dce5;
        border-radius: 8px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 18px 48px rgb(15 23 42 / 8%);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        letter-spacing: 0;
      }
      p {
        margin: 0;
        color: #4b5565;
        line-height: 1.55;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ReelForge Studio</h1>
      <p>P4-00 server core is running. The P4-01 panel will replace this placeholder.</p>
    </main>
  </body>
</html>
