              <circle class="s6-gauge__active" cx="300" cy="300" r="252" transform="rotate(35 300 300)"></circle>
              <line class="s6-gauge__tick" x1="300" y1="538" x2="300" y2="569"></line>

      <script>
        (() => {
          const root = document.querySelector('[data-composition-id="free-s06"]');
          if (!root) return;
          const kicker = root.querySelector(".s6-kicker");
          const notes = root.querySelectorAll(".s6-note, .s6-tag");
          const zeroes = root.querySelectorAll(".s6-zero");
          const gauges = root.querySelectorAll(".s6-gauge");
          const gridlines = root.querySelectorAll(".s6-gridline");
          const comma = root.querySelector(".s6-comma");
          const lockline = root.querySelector(".s6-lockline");
          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });

          tl.set([kicker, notes, gridlines, comma], { opacity: 0 })
            .set(zeroes, { opacity: 0, scale: 0.84, transformOrigin: "50% 50%" })
            .set(gauges, { opacity: 0, scale: 0.88, transformOrigin: "50% 50%" })
            .set(lockline, { scaleX: 0 })
            .to(gridlines, { opacity: 0.74, duration: 0.18, ease: "power2.out" }, 0)
            .fromTo(kicker, { opacity: 0, y: -12 }, { opacity: 1, y: 0, duration: 0.22, ease: "power3.out" }, 0)
            .to(zeroes, { opacity: 1, scale: 1, duration: 0.34, ease: "power4.out" }, 0.02)
            .to(gauges, { opacity: 1, scale: 1, duration: 0.34, ease: "power4.out" }, 0.06)
            .fromTo(notes, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.22, ease: "power3.out" }, 0.16)
            .fromTo(comma, { opacity: 0, scale: 0.45 }, { opacity: 1, scale: 1, duration: 0.2, ease: "back.out(2)" }, 0.22)
            .to(lockline, { scaleX: 1, duration: 0.18, ease: "power3.out" }, 0.3);

          window.__timelines["free-s06"] = tl;
          tl.seek(0);
        })();
