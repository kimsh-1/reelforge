          width: 148px;
          height: 1px;

          content: "";
        }
        @keyframes s4-light-breathe {
          from { filter: brightness(0.82) blur(20px); opacity: 0.17; }
          to { filter: brightness(1.42) blur(25px); opacity: 0.53; }

        @keyframes s4-ghost-breathe {

      <div class="free-s04-rootbox" data-composition-id="free-s04">
        <div class="s4-stage">
          <div class="s4-kicker">REELFORGE / s04</div>
          <div class="s4-ghost-number" aria-hidden="true">01</div>
          <div class="s4-light s4-light--a" aria-hidden="true"></div>
          <div class="s4-light s4-light--b" aria-hidden="true"></div>
          <div class="s4-light s4-light--c" aria-hidden="true"></div>
          <div class="s4-light s4-light--d" aria-hidden="true"></div>
          <div class="s4-horizon" aria-hidden="true"></div>
          <div class="s4-floor" aria-hidden="true"></div>
          <div class="s4-copy" aria-label="한 줄만 던져.">
            <span class="s4-character">한</span><span class="s4-gap" aria-hidden="true"></span><span class="s4-character">줄</span><span class="s4-character">만</span><span class="s4-gap" aria-hidden="true"></span><span class="s4-character">던</span><span class="s4-character">져</span><span class="s4-character">.</span><span class="s4-cursor" aria-hidden="true"></span>
          </div>
          <div class="s4-prompt-line" aria-hidden="true"></div>
          <div class="s4-running">PROMPT / 04</div>
        </div>
      </div>
      <script>
        (() => {
          const root = document.querySelector('[data-composition-id="free-s04"]');
          if (!root) return;
          const stage = root.querySelector(".s4-stage");
          const kicker = root.querySelector(".s4-kicker");
          const running = root.querySelector(".s4-running");
          const cursor = root.querySelector(".s4-cursor");
          const promptLine = root.querySelector(".s4-prompt-line");
          const horizon = root.querySelector(".s4-horizon");
          const floor = root.querySelector(".s4-floor");
          const lights = Array.from(root.querySelectorAll(".s4-light"));
          const characters = Array.from(root.querySelectorAll(".s4-character"));
          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({paused:true});

          tl.set([kicker, running, horizon], { opacity: 0 })
            .set(lights, { opacity: 0, scaleY: 0.14, transformOrigin: "top center" })
            .set(floor, { opacity: 0, y: 44 })
            .set(characters, { opacity: 0, y: 30, filter: "brightness(2.8)" })
            .set(cursor, { opacity: 0, scaleY: 0, transformOrigin: "bottom center" })
            .set(promptLine, { scaleX: 0, transformOrigin: "left center" })
            .fromTo(kicker, { opacity: 0, y: -13 }, { opacity: 1, y: 0, duration: 0.24, ease: "power3.out" }, 0)
            .fromTo(running, { opacity: 0, x: 20 }, { opacity: 1, x: 0, duration: 0.24, ease: "power3.out" }, 0)
            .to(horizon, { opacity: 0.82, duration: 0.3, ease: "power2.out" }, 0.02)
            .to(floor, { opacity: 0.38, y: 0, duration: 0.38, ease: "power3.out" }, 0.02)
            .to(lights, { opacity: 0.44, scaleY: 1, duration: 0.34, stagger: 0.035, ease: "power3.out" }, 0.06)
            .to(cursor, { opacity: 1, scaleY: 1, duration: 0.16, ease: "power3.out" }, 0.16)
            .to(characters, { opacity: 1, y: 0, filter: "brightness(1)", duration: 0.17, stagger: 0.105, ease: "power3.out" }, 0.29)
            .to(promptLine, { scaleX: 1, duration: 0.26, ease: "power3.out" }, 0.88)
            .to(cursor, { opacity: 0.24, duration: 0.12, repeat: 7, yoyo: true, ease: "none" }, 1.12)
            .to(stage, { x: -7, y: 3, duration: 0.035, ease: "none" }, 0.88)
            .to(stage, { x: 4, y: -2, duration: 0.04, ease: "none" }, 0.915)
            .to(stage, { x: 0, y: 0, duration: 0.08, ease: "power2.out" }, 0.955);

          window.__timelines["free-s04"] = tl;
          tl.seek(0);
        })();
      </script>
