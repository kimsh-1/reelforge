      <script>
        (() => {
          const root = document.querySelector('[data-composition-id="free-s07"]');
          if (!root) return;
          const kicker = root.querySelector(".s7-kicker");
          const copy = Array.from(root.querySelectorAll(".s7-copy-line"));
          const proof = root.querySelector(".s7-equals");
          const tree = root.querySelector(".s7-tree");
          const trunk = root.querySelector(".s7-trunk");
          const branches = Array.from(root.querySelectorAll(".s7-branch"));
          const nodes = Array.from(root.querySelectorAll(".s7-node"));
          const labels = Array.from(root.querySelectorAll(".s7-label"));
          const running = root.querySelector(".s7-running");
          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });

          tl.set([kicker, copy, proof, tree, running], { opacity: 0 })
            .set(copy, { x: -42, y: 20 })
            .set(trunk, { scaleY: 0, transformOrigin: "center top" })
            .set(branches, { scaleX: 0, transformOrigin: "left center" })
            .set(nodes, { opacity: 0, scale: 0.35, transformOrigin: "center center" })
            .set(labels, { opacity: 0, x: -18 })
            .fromTo(kicker, { opacity: 0, y: -12 }, { opacity: 1, y: 0, duration: 0.24, ease: "power3.out" }, 0)
            .fromTo(running, { opacity: 0, x: 20 }, { opacity: 1, x: 0, duration: 0.24, ease: "power3.out" }, 0)
            .to(copy[0], { opacity: 1, x: 0, y: 0, duration: 0.26, ease: "power4.out" }, 0.04)
            .to(copy[1], { opacity: 1, x: 0, y: 0, duration: 0.26, ease: "power4.out" }, 0.1)
            .to(tree, { opacity: 1, duration: 0.1, ease: "none" }, 0.1)
            .to(trunk, { scaleY: 1, duration: 0.22, ease: "power3.out" }, 0.05)
            .to(branches, { scaleX: 1, duration: 0.13, stagger: 0.035, ease: "power3.out" }, 0.16)
            .to(nodes, { opacity: 1, scale: 1, duration: 0.1, stagger: 0.035, ease: "back.out(2)" }, 0.18)
            .to(labels, { opacity: 1, x: 0, duration: 0.1, stagger: 0.035, ease: "power3.out" }, 0.16)
            .fromTo(proof, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.16, ease: "power3.out" }, 0.24);

          window.__timelines["free-s07"] = tl;
          tl.seek(0);
        })();
